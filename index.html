<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOSBOARD v2.1 - Intelligent Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- EXTERNAL LIBS -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .card-gradient {
      background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
    }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    // --- CONFIGURATION ---
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzivHMW3lLbLWGP-5dSeV27kdSdx1s_8iJzQbBSvEqpYkQtL0UEKK3ezxZb5mQvYpYC_A/exec";

    // --- SAFE LIBRARY ACCESS ---
    const Recharts = window.Recharts || {};
    const {
      LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
      AreaChart, Area, BarChart, Bar, Cell, PieChart, Pie
    } = Recharts;

    // --- UTILS ---
    const formatNumber = (num) => {
      if (!num && num !== 0) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    };

    const getInstagramThumbnailUrl = (url) => {
      if (!url || !url.includes('instagram.com')) return null;
      const match = url.match(/instagram\.com\/(p|reel)\/([A-Za-z0-9_-]+)/);
      return match ? `https://www.instagram.com/p/${match[2]}/media/?size=l` : null;
    };

    const useToast = () => {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));
      return { toasts, addToast, removeToast };
    };

    // --- BACKEND API CALL ---
    const callBackend = async (action, data = {}) => {
      try {
        const response = await fetch(GAS_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8",
          },
          body: JSON.stringify({ action, data })
        });
        return await response.json();
      } catch (err) {
        console.error("API Error:", err);
        return { error: err.message };
      }
    };

    // --- COMPONENTS ---

    const Toast = ({ toasts, removeToast }) => (
      <div className="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2">
        {toasts.map(t => (
          <div key={t.id} className={`p-4 rounded-2xl min-w-[300px] flex items-center gap-3 text-white shadow-2xl ${
            t.type==='success'?'bg-teal-600': t.type==='error'?'bg-red-600': t.type==='warning'?'bg-amber-600':'bg-blue-600'
          }`}>
            <span className="text-xl">{t.type==='success'?'✅':t.type==='error'?'❌':t.type==='warning'?'⚠️':'ℹ️'}</span>
            <span className="flex-1 text-sm font-bold">{t.message}</span>
            <button onClick={() => removeToast(t.id)} className="opacity-50 hover:opacity-100">✕</button>
          </div>
        ))}
      </div>
    );

    const MetricCard = ({ title, value, subValue, emoji, color, isDark }) => (
      <div className={`p-6 rounded-3xl border transition-all hover:scale-[1.02] ${isDark ? 'bg-slate-800/50 border-slate-700 shadow-xl' : 'bg-white border-slate-100 shadow-md'}`}>
        <div className="flex justify-between items-start mb-4">
          <div>
            <p className="text-xs font-bold uppercase tracking-wider text-slate-500">{title}</p>
            <h3 className="text-3xl font-black mt-1">{value}</h3>
          </div>
          <div className={`p-3 rounded-2xl text-2xl ${isDark ? 'bg-slate-700' : 'bg-slate-50'}`}>{emoji}</div>
        </div>
        <p className="text-xs font-medium opacity-60">{subValue}</p>
      </div>
    );

    const ContentCard = ({ item, type, isDark }) => {
      if (!item) return null;
      const content = type === 'winning' ? item.winningContent : item.losingContent;
      const isWin = type === 'winning';
      const thumb = getInstagramThumbnailUrl(content.link);
      const [imgErr, setImgErr] = useState(false);

      return (
        <div className={`rounded-3xl border overflow-hidden flex flex-col group ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
          <div className="relative h-64 bg-slate-700 overflow-hidden">
            {thumb && !imgErr ? (
              <img src={thumb} className="w-full h-full object-cover transition-transform group-hover:scale-110" onError={() => setImgErr(true)} />
            ) : (
              <div className="w-full h-full flex items-center justify-center text-4xl bg-slate-800">📸</div>
            )}
            <div className="absolute top-4 left-4">
              <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase ${isWin ? 'bg-teal-500 text-white' : 'bg-red-500 text-white'}`}>
                {isWin ? '🏆 Winning' : '📉 Losing'}
              </span>
            </div>
          </div>
          <div className="p-6 flex-1">
            <h4 className="font-black text-lg mb-4 line-clamp-2">{content.title || 'Untitled Content'}</h4>
            <div className="space-y-3">
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900/50' : 'bg-slate-50'}`}>
                <p className="text-[10px] font-black text-blue-500 uppercase">WHAT</p>
                <p className="text-xs opacity-80">{content.analysis.what}</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900/50' : 'bg-slate-50'}`}>
                <p className="text-[10px] font-black text-orange-500 uppercase">WHY</p>
                <p className="text-xs opacity-80">{content.analysis.why}</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900/50' : 'bg-slate-50'}`}>
                <p className="text-[10px] font-black text-teal-500 uppercase">TODO</p>
                <p className="text-xs opacity-80">{content.analysis.todo}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const AIInsightBox = ({ insight, isDark }) => {
      if (!insight) return null;
      return (
        <div className={`p-8 rounded-3xl border ${isDark ? 'bg-indigo-900/20 border-indigo-500/30' : 'bg-blue-50 border-blue-200'}`}>
          <div className="flex items-center gap-3 mb-6">
            <span className="text-3xl">✨</span>
            <h3 className="text-2xl font-black">AI Performance <span className="text-indigo-500">Insights</span></h3>
          </div>
          <p className="text-lg leading-relaxed italic mb-8 opacity-90">"{insight.summary}"</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <h4 className="font-bold text-teal-500 mb-2">💎 Winning Patterns</h4>
              <p className="text-sm opacity-80">{insight.win_pattern}</p>
            </div>
            <div>
              <h4 className="font-bold text-red-500 mb-2">🚫 Avoid These</h4>
              <p className="text-sm opacity-80">{insight.avoid}</p>
            </div>
          </div>
          <div className="mt-8 p-6 rounded-2xl bg-indigo-500/10 border border-indigo-500/20">
            <h4 className="font-bold text-indigo-400 mb-4">💡 Next Week Recommendations</h4>
            <ul className="space-y-2">
              {(insight.recommendations||[]).map((r,i) => <li key={i} className="text-sm flex gap-2"><span>👉</span>{r}</li>)}
            </ul>
          </div>
        </div>
      );
    };

    // --- SUB PAGES ---

    const BackendCMS = ({ data, isDark, onBack, toast }) => {
      const handleSave = async () => {
        toast('Saving data...', 'info');
        const res = await callBackend('saveWeeklyData', data);
        if(res.error) toast('Save failed: ' + res.error, 'error');
        else toast('Saved successfully!', 'success');
      };
      return (
        <div className="space-y-8">
          <div className="flex justify-between items-center">
            <div className="flex items-center gap-4">
              <button onClick={onBack} className="p-3 rounded-xl bg-slate-800 hover:bg-slate-700">⬅️</button>
              <h2 className="text-3xl font-black">Content <span className="text-teal-500">Manager</span></h2>
            </div>
            <button onClick={handleSave} className="px-8 py-3 bg-teal-500 text-white font-black rounded-2xl hover:scale-105 transition">SAVE ALL</button>
          </div>
          <div className="grid gap-4">
            {data.map(w => (
              <div key={w.id} className={`p-6 rounded-2xl border flex justify-between items-center ${isDark ? 'bg-slate-800/50 border-slate-700' : 'bg-white'}`}>
                <div><p className="text-xs opacity-50">{w.dateRange}</p><h4 className="font-black text-xl">{w.label}</h4></div>
                <button className="px-4 py-2 bg-indigo-500/20 text-indigo-400 font-bold rounded-lg">EDIT DATA</button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const ContentLibraryPage = ({ isDark, onBack, toast }) => {
      const [library, setLibrary] = useState([]);
      useEffect(() => {
        callBackend('getContentLibrary').then(res => {
          if (res.success) setLibrary(res.data);
        });
      }, []);
      return (
        <div className="space-y-8">
          <div className="flex items-center gap-4">
            <button onClick={onBack} className="p-3 rounded-xl bg-slate-800 hover:bg-slate-700">⬅️</button>
            <h2 className="text-3xl font-black">Smart <span className="text-teal-500">Library</span></h2>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {library.map((item, i) => (
              <div key={i} className={`p-6 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white shadow-sm'}`}>
                <h4 className="font-black mb-4 h-12 line-clamp-2">{item.title}</h4>
                <div className="flex flex-wrap gap-2 mb-4">
                  {item.tags.map(t => <span key={t} className="text-[10px] font-bold px-2 py-1 bg-indigo-500/10 text-indigo-400 rounded-full">#{t}</span>)}
                </div>
                <a href={item.link} target="_blank" className="text-xs font-bold text-blue-500">View Source ↗️</a>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const ForecastHeatmapPage = ({ data, isDark, onBack }) => {
      return (
        <div className="space-y-8">
          <div className="flex items-center gap-4">
            <button onClick={onBack} className="p-3 rounded-xl bg-slate-800 hover:bg-slate-700">⬅️</button>
            <h2 className="text-3xl font-black">🔮 Forecast & <span className="text-teal-500">Heatmap</span></h2>
          </div>
          <div className={`p-12 rounded-3xl border text-center ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white'}`}>
             <p className="text-slate-500">Performance forecasting and optimal posting time visualization.</p>
             <div className="mt-8 h-64 bg-slate-900/50 rounded-2xl flex items-center justify-center font-black opacity-20">CHART AREA</div>
          </div>
        </div>
      );
    };

    const ContentAuditorModal = ({ isDark, onClose, toast }) => (
      <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-sm">
        <div className={`w-full max-w-xl p-8 rounded-3xl border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-white shadow-2xl'}`}>
          <div className="flex justify-between items-center mb-6">
            <h3 className="text-2xl font-black">🤖 AI Content Auditor</h3>
            <button onClick={onClose}>✕</button>
          </div>
          <div className="space-y-4">
            <input placeholder="Content Hook / Title" className="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none" />
            <textarea placeholder="Caption Draft" rows="4" className="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 outline-none"></textarea>
            <button className="w-full py-4 bg-gradient-to-r from-teal-500 to-blue-600 rounded-xl font-black">✨ AUDIT NOW</button>
          </div>
        </div>
      </div>
    );

    const FloatingAgent = ({ isDark }) => {
      const [open, setOpen] = useState(false);
      return (
        <div className="fixed bottom-8 right-8 z-50">
          {open && (
            <div className={`mb-4 w-80 h-96 rounded-2xl border shadow-2xl flex flex-col ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white'}`}>
              <div className="p-4 bg-indigo-600 text-white font-black flex justify-between"><span>🤖 SOSBOARD AI</span><button onClick={()=>setOpen(false)}>▼</button></div>
              <div className="flex-1 p-4 text-xs opacity-50 italic">Agent ready to help...</div>
              <div className="p-3 border-t border-slate-700"><input placeholder="Ask me anything..." className="w-full bg-transparent outline-none" /></div>
            </div>
          )}
          <button onClick={()=>setOpen(true)} className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center text-2xl shadow-xl hover:scale-110 transition">💬</button>
        </div>
      );
    };

    // --- APP ---

    function App() {
      const [isDark, setIsDark] = useState(true);
      const [view, setView] = useState('dashboard');
      const [showAuditor, setShowAuditor] = useState(false);
      const [data, setData] = useState([]);
      const [insight, setInsight] = useState(null);
      const [loading, setLoading] = useState(true);
      const { toasts, addToast, removeToast } = useToast();

      useEffect(() => {
        if (GAS_API_URL.includes('YOUR_SCRIPT_ID')) {
          addToast("Please set GAS_API_URL in index.html", "error");
          setLoading(false);
          return;
        }

        callBackend('getWeeklyData').then(res => {
          if (res && res.error) {
             addToast(res.error, "error");
             setLoading(false);
             return;
          }
          setData(res || []);
          setLoading(false);
          
          // Generate AI insight
          callBackend('generateAIInsight', res).then(ins => {
            if (ins && ins.success) setInsight(ins.data);
          });
        });
      }, []);

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900">
          <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      );

      const avgReach = useMemo(() => {
        if (!data || data.length === 0) return 0;
        return data.reduce((s,w)=>s+(w.metrics?.reach||0),0)/data.length;
      }, [data]);

      const avgViews = useMemo(() => {
        if (!data || data.length === 0) return 0;
        return data.reduce((s,w)=>s+(w.metrics?.views||0),0)/data.length;
      }, [data]);

      return (
        <div className={`min-h-screen transition-colors duration-500 ${isDark ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
          <nav className={`sticky top-0 z-50 backdrop-blur-xl border-b ${isDark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-slate-200'}`}>
            <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
              <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('dashboard')}>
                <div className="w-12 h-12 bg-gradient-to-br from-teal-400 to-blue-600 rounded-2xl flex items-center justify-center"><span className="text-white font-black text-2xl">S</span></div>
                <h1 className="font-black text-xl">SOSBOARD <span className="text-teal-500 text-xs">PRO</span></h1>
              </div>
              <div className="flex items-center gap-8">
                <button onClick={()=>setView('dashboard')} className={`text-[10px] font-black tracking-widest uppercase ${view==='dashboard'?'text-teal-400':''}`}>Dashboard</button>
                <button onClick={()=>setView('library')} className={`text-[10px] font-black tracking-widest uppercase ${view==='library'?'text-teal-400':''}`}>Library</button>
                <button onClick={()=>setView('forecast')} className={`text-[10px] font-black tracking-widest uppercase ${view==='forecast'?'text-teal-400':''}`}>Forecast</button>
                <button onClick={()=>setView('cms')} className={`text-[10px] font-black tracking-widest uppercase ${view==='cms'?'text-teal-400':''}`}>Admin</button>
                <button onClick={()=>setIsDark(!isDark)} className="p-3 bg-slate-800/50 rounded-xl">{isDark?'🌙':'☀️'}</button>
              </div>
            </div>
          </nav>

          <main className="max-w-7xl mx-auto px-6 py-12">
            {view === 'dashboard' && (
              <div className="space-y-12 animate-fade-in">
                <div className="flex justify-between items-end">
                  <h2 className="text-4xl font-black">Performance <span className="text-teal-500">Overview</span></h2>
                  <button onClick={() => setShowAuditor(true)} className="px-6 py-3 bg-indigo-600 text-white font-black rounded-2xl hover:scale-105 transition">🤖 AI Auditor</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                  <MetricCard title="Avg. Weekly Reach" value={formatNumber(avgReach)} emoji="🚀" color="blue" isDark={isDark} subValue="+12% vs last month" />
                  <MetricCard title="Avg. Views" value={formatNumber(avgViews)} emoji="👁️" color="purple" isDark={isDark} subValue="Stabilized" />
                  <MetricCard title="Engagement Rate" value="4.8%" emoji="💬" color="teal" isDark={isDark} subValue="Above benchmark" />
                  <MetricCard title="System Status" value="Online" emoji="⚡" color="orange" isDark={isDark} subValue="v2.1 Stable" />
                </div>
                {insight && <AIInsightBox insight={insight} isDark={isDark} />}
                {data.length > 0 && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <ContentCard item={data[data.length-1]} type="winning" isDark={isDark} />
                    <ContentCard item={data[data.length-1]} type="losing" isDark={isDark} />
                  </div>
                )}
              </div>
            )}
            {view === 'cms' && <BackendCMS data={data} isDark={isDark} onBack={()=>setView('dashboard')} toast={addToast} />}
            {view === 'library' && <ContentLibraryPage isDark={isDark} onBack={()=>setView('dashboard')} toast={addToast} />}
            {view === 'forecast' && <ForecastHeatmapPage data={data} isDark={isDark} onBack={()=>setView('dashboard')} />}
          </main>

          {showAuditor && <ContentAuditorModal isDark={isDark} onClose={() => setShowAuditor(false)} toast={addToast} />}
          <FloatingAgent isDark={isDark} />
          <Toast toasts={toasts} removeToast={removeToast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    window.addEventListener('load', () => {
      if (window.lucide) window.lucide.createIcons();
    });
  </script>
</body>
</html>

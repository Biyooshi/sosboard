tings} />\n            <\/div>\n          )}\n\n          {activeTab === 'data' && (\n            <>\n              <div className=\"mb-6 flex justify-end gap-3\">\n                <button\n                  onClick={() => {\n                    if (typeof google !== 'undefined' && google.script) {\n                      google.script.run\n                        .withSuccessHandler((serverData) => {\n                          if (serverData && Array.isArray(serverData)) {\n                            setData(serverData);\n                            alert(\"✅ Data refreshed! (\" + serverData.length + \" weeks loaded)\");\n                          } else {\n                            setData([]);\n                            alert(\"Database is empty. You can start adding weeks.\");\n                          }\n                        })\n                        .withFailureHandler((e) => {\n                          alert(\"Failed to refresh: \" + e);\n                        })\n                        .getWeeklyData();\n                    }\n                  }}\n                  className={`px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 ${isDark ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}\n                >\n                  🔃 Refresh\n                <\/button>\n                <button onClick={handleAddNew} className={`px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 ${isDark ? 'bg-teal-600 text-white hover:bg-teal-700' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>➕ Add New Week<\/button>\n              <\/div>\n              {editingId ? (\n                <div className={`p-8 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-xl'}`}>\n                  <div className=\"flex justify-between items-center mb-8 border-b pb-6 border-slate-700/50\">\n                    <div>\n                      <h3 className={`text-xl font-bold ${isDark ? 'text-teal-400' : 'text-blue-600'}`}>\n                        Editing: {formData.label} {formData.startDate ? `(${new Date(formData.startDate).getFullYear()})` : ''}\n                      <\/h3>\n                    <\/div>\n                    <div className=\"flex items-center gap-4\"><div className={`px-4 py-2 rounded-xl border text-xs ${isDark ? 'bg-slate-900 border-slate-600' : 'bg-slate-50 border-slate-200'}`}>Calculated Total: <span className=\"font-bold text-teal-400 text-sm ml-1\">{formatNumber(currentTotal)}<\/span><\/div><\/div>\n                  <\/div>\n\n                  {/* 1. Core Metrics */}\n                  <div className=\"mb-8\">\n                    <h4 className={`text-sm font-bold mb-4 uppercase tracking-wider ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>1. Core Metrics<\/h4>\n                    <div className=\"grid grid-cols-2 md:grid-cols-4 gap-6\">\n                      {[\n                        { k: 'reach', l: 'Reach', t: 'Source: IG Pro Dashboard > Accounts Reached' },\n                        { k: 'engagement', l: 'Engagement', t: 'Source: IG Pro Dashboard > Total Interactions' },\n                        { k: 'views', l: 'Views', t: 'Source: IG Pro Dashboard > Impressions' },\n                        { k: 'profileActivity', l: 'Profile Activity', t: 'Source: IG Pro Dashboard > Profile Activity' }\n                      ].map(f => (\n                        <div key={f.k}><label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{f.l} <InfoTooltip text={f.t} isDark={isDark} /><\/label><input type=\"number\" value={formData.metrics[f.k]} onChange={e => setFormData({ ...formData, metrics: { ...formData.metrics, [f.k]: parseInt(e.target.value) || 0 } })} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`} /><\/div>\n                      ))}\n                    <\/div>\n                  <\/div>\n\n                  {/* 2. Percentages */}\n                  <div className=\"mb-8\">\n                    <h4 className={`text-sm font-bold mb-4 uppercase tracking-wider ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>🧮 2. Percentages (Formula: Reach * % / 100)<\/h4>\n                    <div className=\"grid grid-cols-2 md:grid-cols-5 gap-4\">\n                      {[{ k: 'followersPct', l: 'Followers' }, { k: 'nonFollowersPct', l: 'Non-Followers' }, { k: 'storiesPct', l: 'Stories' }, { k: 'reelsPct', l: 'Reels' }, { k: 'feedsPct', l: 'Feeds' }].map(f => (\n                        <div key={f.k} className={`p-4 rounded-xl border ${isDark ? 'border-slate-700 bg-slate-800/50' : 'border-slate-200 bg-white'}`}>\n                          <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{f.l} %<\/label>\n                          <input type=\"number\" value={formData.metrics[f.k]} onChange={e => setFormData({ ...formData, metrics: { ...formData.metrics, [f.k]: parseFloat(e.target.value) || 0 } })} className={`w-full p-2 rounded-lg text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`} />\n                          <span className=\"text-[10px] text-slate-500 font-mono block mt-1\">{formData.metrics[f.k]}% * Reach = {formatNumber(calculateAbsolute(formData.metrics.reach, formData.metrics[f.k]))}<\/span>\n                        <\/div>\n                      ))}\n                    <\/div>\n                  <\/div>\n\n                  {/* 3. Winning/Losing */}\n                  <div className=\"grid grid-cols-1 md:grid-cols-2 gap-6\">\n                    {[{ type: 'winningContent', t: '3A. Winning' }, { type: 'losingContent', t: '3B. Losing' }].map(s => (\n                      <div key={s.type} className={`p-6 rounded-2xl border border-dashed border-slate-600`}>\n                        <h4 className={`text-sm font-bold mb-4 uppercase ${isDark ? 'text-teal-400' : 'text-teal-600'}`}>{s.t}<\/h4>\n                        <div className=\"space-y-3\">\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>\n                              Content Type\n                              <InfoTooltip text=\"Select the type of content: IGR (Instagram Reels), IGF (Instagram Feed), IGS (Instagram Stories), LKDN (LinkedIn), TKTK (TikTok)\" isDark={isDark} />\n                            <\/label>\n                            <select value={formData[s.type].type} onChange={e => setFormData({ ...formData, [s.type]: { ...formData[s.type], type: e.target.value } })} className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`}>\n                              <option value=\"IGR\">IGR - Instagram Reels<\/option>\n                              <option value=\"IGF\">IGF - Instagram Feed<\/option>\n                              <option value=\"IGS\">IGS - Instagram Stories<\/option>\n                              <option value=\"LKDN\">LKDN - LinkedIn<\/option>\n                              <option value=\"TKTK\">TKTK - TikTok<\/option>\n                            <\/select>\n                          <\/div>\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>\n                              Title\n                              <InfoTooltip text=\"Enter the title or description of the content piece\" isDark={isDark} />\n                            <\/label>\n                            <input placeholder=\"Content Title\" value={formData[s.type].title} onChange={e => setFormData({ ...formData, [s.type]: { ...formData[s.type], title: e.target.value } })} className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`} />\n                          <\/div>\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>\n                              Link\n                              <InfoTooltip text=\"Enter the full Instagram post URL (e.g., https://www.instagram.com/p/DSWiCDFklbB/). The preview will be automatically generated.\" isDark={isDark} />\n                            <\/label>\n                            <input\n                              placeholder=\"https://www.instagram.com/p/...\"\n                              value={formData[s.type]?.link || ''}\n                              onChange={e => {\n                                const newLink = e.target.value;\n                                setFormData({\n                                  ...formData,\n                                  [s.type]: {\n                                    ...formData[s.type],\n                                    link: newLink\n                                  }\n                                });\n                              }}\n                              className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`}\n                            />\n                            {/* Preview Feature */}\n                            <div className=\"mt-2 flex items-center gap-2\">\n                              <button\n                                onClick={(e) => {\n                                  e.preventDefault();\n                                  const url = formData[s.type]?.link;\n                                  if (!url) return alert(\"Please enter a URL first\");\n\n                                  const btn = e.target;\n                                  const originalText = btn.innerText;\n                                  btn.innerText = \"Fetching...\";\n\n                                  if (typeof google !== 'undefined' && google.script) {\n                                    google.script.run\n                                      .withSuccessHandler((res) => {\n                                        btn.innerText = originalText;\n                                        if (res.error) {\n                                          alert(\"Error: \" + res.error);\n                                        } else {\n                                          if (res.image) {\n                                            // Show preview in a modal or just alert success\n                                            alert(\"✅ Thumbnail found! It will appear on the dashboard.\");\n                                            // Update form with clean link if available\n                                            setFormData({\n                                              ...formData,\n                                              [s.type]: {\n                                                ...formData[s.type],\n                                                link: res.cleanLink || url\n                                              }\n                                            });\n                                          } else {\n                                            alert(\"⚠️ Link valid but no thumbnail found. Dashboard will use placeholder.\");\n                                          }\n                                        }\n                                      })\n                                      .withFailureHandler((err) => {\n                                        btn.innerText = originalText;\n                                        alert(\"Error: \" + err);\n                                      })\n                                      .getLinkPreview(url);\n                                  } else {\n                                    alert(\"Preview only works in deployed app\");\n                                    btn.innerText = originalText;\n                                  }\n                                }}\n                                className={`px-3 py-1 rounded text-xs font-bold ${isDark ? 'bg-indigo-600 text-white' : 'bg-indigo-100 text-indigo-700'}`}\n                              >\n                                🖼️ Fetch Preview\n                              <\/button>\n                              {formData[s.type]?.link && formData[s.type]?.link.includes('instagram.com') && (\n                                <span className=\"text-xs text-green-500\">Instagram Link Detected<\/span>\n                              )}\n                            <\/div>\n                          <\/div>\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 text-blue-500`}>\n                              WHAT\n                              <InfoTooltip text=\"Describe what the content is about\" isDark={isDark} />\n                            <\/label>\n                            <textarea rows={2} placeholder=\"Describe the content...\" value={formData[s.type].analysis.what} onChange={e => setFormData({ ...formData, [s.type]: { ...formData[s.type], analysis: { ...formData[s.type].analysis, what: e.target.value } } })} className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`} />\n                          <\/div>\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 text-orange-500`}>\n                              WHY\n                              <InfoTooltip text=\"Explain why this content performed well or poorly\" isDark={isDark} />\n                            <\/label>\n                            <textarea rows={2} placeholder=\"Why did it perform this way?\" value={formData[s.type].analysis.why} onChange={e => setFormData({ ...formData, [s.type]: { ...formData[s.type], analysis: { ...formData[s.type].analysis, why: e.target.value } } })} className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`} />\n                          <\/div>\n                          <div>\n                            <label className={`block text-xs font-bold mb-1 flex items-center gap-2 text-teal-500`}>\n                              TODO\n                              <InfoTooltip text=\"List the next steps or actions to take based on this content's performance\" isDark={isDark} />\n                            <\/label>\n                            <textarea rows={2} placeholder=\"Next steps...\" value={formData[s.type].analysis.todo} onChange={e => setFormData({ ...formData, [s.type]: { ...formData[s.type], analysis: { ...formData[s.type].analysis, todo: e.target.value } } })} className={`w-full p-2 rounded border ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300'}`} />\n                          <\/div>\n                        <\/div>\n                      <\/div>\n                    ))}\n                  <\/div>\n\n                  <div className=\"flex justify-end gap-3 mt-8\">\n                    <button onClick={() => setEditingId(null)} className={`px-8 py-3 rounded-xl text-sm font-bold ${isDark ? 'bg-slate-700 text-slate-300 hover:bg-slate-600' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Cancel<\/button>\n                    <button\n                      onClick={handleSave}\n                      disabled={isSaving}\n                      className={`px-8 py-3 rounded-xl text-sm font-bold shadow-lg transition ${isSaving\n                          ? 'bg-slate-400 text-slate-200 cursor-not-allowed'\n                          : 'bg-teal-500 text-white hover:bg-teal-600'\n                        }`}\n                      id=\"save-week-btn\"\n                    >\n                      {isSaving ? '⏳ Saving...' : '💾 Save'}\n                    <\/button>\n                  <\/div>\n                <\/div>\n              ) : (\n                <div className=\"space-y-4\">\n                  {(() => {\n                    const groupedByMonth = {};\n                    data.forEach(week => {\n                      const month = new Date(week.startDate).toLocaleString('en-US', { month: 'long', year: 'numeric' });\n                      if (!groupedByMonth[month]) groupedByMonth[month] = [];\n                      groupedByMonth[month].push(week);\n                    });\n                    const months = Object.keys(groupedByMonth).sort((a, b) => new Date(a) - new Date(b));\n                    return months.map((month, monthIdx) => (\n                      <div key={month}>\n                        {monthIdx > 0 && (\n                          <div className={`my-6 border-t ${isDark ? 'border-slate-700' : 'border-slate-300'}`}><\/div>\n                        )}\n                        <div className={`mb-4 px-4 py-2 rounded-lg ${isDark ? 'bg-slate-800 border border-slate-700' : 'bg-slate-100 border border-slate-200'}`}>\n                          <h3 className={`text-lg font-bold ${isDark ? 'text-teal-400' : 'text-teal-600'}`}>{month}<\/h3>\n                        <\/div>\n                        {groupedByMonth[month].map((week, weekIdx) => (\n                          <div key={week.id} className={`p-5 rounded-2xl border flex justify-between items-center transition ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>\n                            <div className=\"font-bold text-lg\">\n                              <span className=\"text-xs text-slate-500 mr-2\">#{weekIdx + 1}<\/span>\n                              {week.label} <span className=\"text-xs font-normal text-slate-500 block\">{week.dateRange}<\/span>\n                            <\/div>\n                            <div className=\"flex gap-2\">\n                              <button\n                                onClick={() => handleEdit(week.id)}\n                                disabled={isSaving}\n                                className={`px-5 py-2.5 rounded-xl font-bold text-sm transition ${isSaving\n                                    ? 'bg-slate-300 text-slate-400 cursor-not-allowed'\n                                    : 'bg-slate-500 text-white hover:bg-slate-600'\n                                  }`}\n                              >\n                                ✏️ Edit\n                              <\/button>\n                              <button\n                                onClick={() => handleDelete(week.id)}\n                                disabled={isSaving}\n                                className={`px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition ${isSaving\n                                    ? 'bg-slate-300 text-slate-400 cursor-not-allowed'\n                                    : (isDark ? 'bg-red-500/20 text-red-400 hover:bg-red-500/30' : 'bg-red-50 text-red-600 hover:bg-red-100')\n                                  }`}\n                              >\n                                🗑️ Delete\n                              <\/button>\n                            <\/div>\n                          <\/div>\n                        ))}\n                      <\/div>\n                    ));\n                  })()}\n                <\/div>\n              )}\n            <\/>\n          )}\n          <footer className={`mt-12 py-8 text-center border-t ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>\n            <p className={`text-sm font-medium ${isDark ? 'text-slate-100' : 'text-slate-900'}`}>Made by CMO JOY - Muhammad Nurul Qolbi<\/p>\n            <a href=\"http://instagram.com/biyoosh.i/\" target=\"_blank\" rel=\"noreferrer\" className=\"text-xs text-blue-500 hover:text-blue-400 mt-1 inline-flex items-center gap-1\">📷 @biyoosh.i<\/a>\n          <\/footer>\n        <\/div>\n      )\n    };\n\n\n\n    // --- MAIN COMPONENT ---\n    function App() {\n      const [isDark, setIsDark] = useState(true);\n      const [viewMode, setViewMode] = useState('frontend');\n      const [data, setData] = useState([]);\n      const [loading, setLoading] = useState(true);\n      const [showExport, setShowExport] = useState(false);\n      const [showComparison, setShowComparison] = useState(false);\n      const [timeRange, setTimeRange] = useState('last_30_days');\n      const [targets, setTargets] = useState({});\n      const [allGrowthData, setAllGrowthData] = useState([]);\n      const [selectedTargetMonth, setSelectedTargetMonth] = useState('December');\n\n      const loadDataFromServer = () => {\n        if (typeof google !== 'undefined' && google.script) {\n          console.log(\"Loading data from Google Apps Script...\");\n          google.script.run\n            .withSuccessHandler((serverData) => {\n              console.log(\"Received data from server:\", serverData);\n              // ALWAYS use server data, even if empty - NEVER fall back to mock data\n              if (serverData && Array.isArray(serverData)) {\n                // Ensure all links are properly loaded (not '#')\n                const cleanedData = serverData.map(item => ({\n                  ...item,\n                  winningContent: {\n                    ...item.winningContent,\n                    link: item.winningContent?.link === '#' ? '' : (item.winningContent?.link || ''),\n                    thumbnail: '' // Always empty, not used\n                  },\n                  losingContent: {\n                    ...item.losingContent,\n                    link: item.losingContent?.link === '#' ? '' : (item.losingContent?.link || ''),\n                    thumbnail: '' // Always empty, not used\n                  }\n                }));\n                setData(cleanedData);\n                console.log(\"Data loaded and cleaned:\", cleanedData.length, \"weeks\");\n              } else {\n                console.log(\"Server returned invalid data, using empty array\");\n                setData([]);\n              }\n              setLoading(false);\n            })\n            .withFailureHandler((e) => {\n              console.error(\"Failed to load weekly data:\", e);\n              // On error, keep empty array - NEVER use mock data when connected to server\n              setData([]);\n              setLoading(false);\n              alert(\"Failed to load data from database. Please refresh the page.\");\n            })\n            .getWeeklyData();\n\n          google.script.run\n            .withSuccessHandler((monthlyTargets) => {\n              setTargets(monthlyTargets || {});\n              // Set default selected month to current month\n              const now = new Date();\n              const monthName = now.toLocaleString('en-US', { month: 'long' });\n              const year = now.getFullYear();\n              setSelectedTargetMonth(`${monthName} ${year}`);\n            })\n            .withFailureHandler((e) => {\n              console.error(\"Failed to load targets:\", e);\n              setTargets({});\n            })\n            .getTargets();\n\n          google.script.run\n            .withSuccessHandler((gData) => {\n              if (gData && Array.isArray(gData)) {\n                setAllGrowthData(gData);\n              }\n            })\n            .getGrowthData();\n        } else {\n          // Demo mode - use initial data only if no server available\n          console.log(\"Running in demo mode (no Google Apps Script)\");\n          // Ensure metrics are initialized to 0 explicitly to avoid \"100%\" ghost issue\n          // Also ensure content structure is robust\n          const cleanData = initialWeeklyData.map(item => ({\n            ...item,\n            metrics: {\n              reach: item.metrics?.reach || 0,\n              engagement: item.metrics?.engagement || 0,\n              views: item.metrics?.views || 0,\n              profileActivity: item.metrics?.profileActivity || 0,\n              followersPct: item.metrics?.followersPct || 0,\n              nonFollowersPct: item.metrics?.nonFollowersPct || 0,\n              storiesPct: item.metrics?.storiesPct || 0,\n              reelsPct: item.metrics?.reelsPct || 0,\n              feedsPct: item.metrics?.feedsPct || 0\n            },\n            winningContent: {\n              ...item.winningContent,\n              link: item.winningContent?.link || ''\n            },\n            losingContent: {\n              ...item.losingContent,\n              link: item.losingContent?.link || ''\n            }\n          }));\n\n          setData(cleanData);\n          setLoading(false);\n        }\n      };\n\n      useEffect(() => {\n        loadDataFromServer();\n      }, []);\n\n      // QUOTA OPTIMIZATION: Reduced auto-refresh to 5 minutes (from 60s)\n      // Prevents Google Apps Script quota exhaustion with multiple users\n      useEffect(() => {\n        if (typeof google !== 'undefined' && google.script && viewMode === 'frontend') {\n          const interval = setInterval(() => {\n            console.log(\"🔄 Auto-refreshing data... (5 min interval)\");\n            loadDataFromServer();\n          }, 300000); // 5 minutes = 300000ms (was 60000ms)\n\n          return () => clearInterval(interval);\n        }\n      }, [viewMode]);\n\n      // Reload data when returning from backend view to ensure sync\n      useEffect(() => {\n        if (viewMode === 'frontend' && !loading) {\n          // Small delay to ensure backend operations complete\n          const timer = setTimeout(() => {\n            loadDataFromServer();\n          }, 500);\n          return () => clearTimeout(timer);\n        }\n      }, [viewMode]);\n\n      const filteredData = useMemo(() => {\n        const today = new Date('2025-12-31');\n        return data.filter(item => {\n          const itemDate = new Date(item.startDate);\n          const diffDays = Math.ceil(Math.abs(today - itemDate) / (1000 * 60 * 60 * 24));\n          switch (timeRange) {\n            case 'last_week': return diffDays <= 7;\n            case 'current_month': return itemDate.getMonth() === today.getMonth() && itemDate.getFullYear() === today.getFullYear();\n            case 'last_30_days': return diffDays <= 30;\n            case 'prev_month': return itemDate.getMonth() === today.getMonth() - 1;\n            case 'last_3_months': return diffDays <= 90;\n            case 'last_6_months': return diffDays <= 180;\n            case 'last_9_months': return diffDays <= 270;\n            case 'last_1_year': return diffDays <= 365;\n            default: return true;\n          }\n        });\n      }, [data, timeRange]);\n\n      const metrics = useMemo(() => {\n        if (filteredData.length === 0) return { reach: 0, views: 0, er: 0, growth: 0, engagement: 0 };\n        const reach = filteredData.reduce((acc, curr) => acc + curr.metrics.reach, 0);\n        const views = filteredData.reduce((acc, curr) => acc + curr.metrics.views, 0);\n        const engagement = filteredData.reduce((acc, curr) => acc + curr.metrics.engagement, 0);\n        const er = reach > 0 ? (engagement / reach) * 100 : 0;\n        let growth = 0;\n\n        if (data.length > filteredData.length) {\n          const prevReach = data[0].metrics.reach;\n          if (prevReach > 0) {\n            growth = ((reach - prevReach) / prevReach) * 100;\n          } else {\n            growth = 0; // Avoid Infinity\n          }\n        }\n        return { reach, views, er: er.toFixed(2), engagement, growth: growth.toFixed(1) };\n      }, [filteredData, data]);\n\n      const periodContent = useMemo(() => {\n        if (filteredData.length === 0) return { winning: null, losing: null };\n        const sorted = [...filteredData].sort((a, b) => b.metrics.engagement - a.metrics.engagement);\n        let label = \"Selected Period\";\n        if (timeRange === 'current_month') label = \"December\";\n        if (timeRange === 'prev_month') label = \"November\";\n        if (timeRange === 'last_week') label = sorted[0].label;\n        return { winning: { ...sorted[0], label }, losing: { ...sorted[sorted.length - 1], label } };\n      }, [filteredData, timeRange]);\n\n      const followerGrowth = useMemo(() => {\n        if (!allGrowthData || allGrowthData.length === 0) return { pct: 0, label: 'vs Previous', value: 0 };\n\n        // Helper to find data by month/year\n        const findData = (monthName, year) => {\n          const searchStr = `${monthName} ${year}`;\n          return allGrowthData.find(d => d.month === searchStr);\n        };\n\n        const today = new Date('2025-12-31'); // Fixed reference date as per app logic\n        let targetDate = new Date(today);\n        let baselineDate = new Date(today);\n\n        // Determine Baseline Shift based on Range\n        // Logic: Compare \"Target Period End\" vs \"Target Period Start (or Before)\"\n        switch (timeRange) {\n          case 'prev_month':\n            // Target: Nov 2025, Baseline: Oct 2025\n            targetDate.setMonth(today.getMonth() - 1);\n            baselineDate.setMonth(today.getMonth() - 2);\n            break;\n          case 'last_3_months':\n            // Target: Dec 2025, Baseline: Sept 2025 (3 months ago)\n            baselineDate.setMonth(today.getMonth() - 3);\n            break;\n          case 'last_6_months':\n            baselineDate.setMonth(today.getMonth() - 6);\n            break;\n          case 'last_9_months':\n            baselineDate.setMonth(today.getMonth() - 9);\n            break;\n          case 'last_1_year':\n            baselineDate.setFullYear(today.getFullYear() - 1);\n            break;\n          case 'current_month':\n          case 'last_week':\n          case 'last_30_days':\n          default:\n            // Default: Current Month vs Previous Month\n            // Target: Dec 2025, Baseline: Nov 2025\n            baselineDate.setMonth(today.getMonth() - 1);\n            break;\n        }\n\n        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n\n        const targetMonthName = monthNames[targetDate.getMonth()];\n        const targetYear = targetDate.getFullYear();\n        const baselineMonthName = monthNames[baselineDate.getMonth()];\n        const baselineYear = baselineDate.getFullYear();\n\n        const targetEntry = findData(targetMonthName, targetYear);\n        const baselineEntry = findData(baselineMonthName, baselineYear);\n\n        const currentTotal = targetEntry ? (targetEntry.totalFollowers || 0) : 0;\n        const prevTotal = baselineEntry ? (baselineEntry.totalFollowers || 0) : 0;\n\n        let pct = 0;\n        if (prevTotal > 0) {\n          pct = ((currentTotal - prevTotal) / prevTotal) * 100;\n        } else if (currentTotal > 0 && prevTotal === 0) {\n          pct = 100; // New growth from 0\n        }\n\n        const label = `vs ${baselineMonthName.substr(0, 3)} '${String(baselineYear).substr(2)}`;\n\n        return { pct: pct.toFixed(1), label, value: currentTotal };\n      }, [allGrowthData, timeRange]);\n\n      const toggleTheme = () => {\n        setIsDark(!isDark);\n        document.documentElement.classList.toggle('dark', !isDark);\n      };\n\n      if (loading) {\n        return (\n          <div className=\"min-h-screen flex items-center justify-center bg-slate-900 text-white\">\n            <div className=\"text-center\">\n              <div className=\"text-xl font-bold mb-2\">Loading Data...<\/div>\n              <div className=\"text-sm text-slate-400\">Synchronizing with database...<\/div>\n            <\/div>\n          <\/div>\n        );\n      }\n\n      if (viewMode === 'backend') {\n rs Growth Trend\" value={`${followerGrowth.pct > 0 ? '+' : ''}${followerGrowth.pct}%`} subValue={followerGrowth.label} iconName=\"Users\" color=\"orange\" isDark={isDark} emoji=\"📊\" />\n              <\/div>\n              <MonthlyTargetsWidget\n                monthlyTargets={targets}\n                selectedMonth={selectedTargetMonth}\n                onMonthChange={setSelectedTargetMonth}\n                metrics={metrics}\n                isDark={isDark}\n                allData={data}\n              />\n            <\/div>\n\n            {/* Charts Section */}\n            <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6\">\n              {(() => {\n                const reachData = filteredData.map(w => ({ label: w.label, value: w.metrics.reach }));\n                const reachValues = reachData.map(d => d.value);\n                const reachMin = Math.min(...reachValues, 0);\n                const reachMax = Math.max(...reachValues, 1);\n                const reachPadding = (reachMax - reachMin) * 0.1;\n                return (\n                  <div className={`p-6 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`}>\n                    <h4 className={`text-sm font-bold mb-4 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>📈 Total Reach Trend<\/h4>\n                    <ResponsiveContainer width=\"100%\" height={200}>\n                      <LineChart data={reachData} margin={{ top: 5, right: 5, left: 5, bottom: 5 }}>\n                        <CartesianGrid strokeDasharray=\"3 3\" stroke={isDark ? '#334155' : '#e2e8f0'} />\n                        <XAxis dataKey=\"label\" stroke={isDark ? '#94a3b8' : '#64748b'} fontSize={10} angle={-45} textAnchor=\"end\" height={60} />\n                        <YAxis stroke={isDark ? '#94a3b8' : '#64748b'} fontSize={10} domain={[Math.max(0, reachMin - reachPadding), reachMax + reachPadding]} width={50} />\n                        <Tooltip content              <\/ResponsiveContainer>\n                  <\/div>\n                );\n              })()}\n              {(() => {\n                const erData = filteredData.map(w => ({ label: w.label, value: parseFloat(((w.metrics.engagement / w.metrics.reach) * 100).toFixed(2)) || 0 }));\n                const erValues = erData.map(d => d.value);\n                const erMin = Math.min(...erValues, 0);\n                const erMax = Math.max(...erValues, 1);\n                const erPadding = (erMax - erMin) * 0.1;\n                return (\n                  <div className={`p-6 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`}>\n                    <h4 className={`text-sm font-bold mb-4 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>📊 Avg. Eng. Rate Trend<\/h4>\n                    <ResponsiveContainer width=\"100%\" height={200}>\n                      <LineChart data={erData} margin={{ top: 5, right: 5, left: 5, bottom: 5 }}>\n                        <CartesianGrid strokeDasharray=\"3 3\" stroke={isDark ? '#334155' : '#e2e8f0'} />\n                        <XAxis dataKey=\"label\" stroke={isDark ? '#94a3b8' : '#64748b'} fontSize={10} angle={-45} textAnchor=\"end\" height={60} />\n                        <YAxis stroke={isDark ? '#94a3b8' : '#64748b'} fontSize={10} domain={[Math.max(0, erMin - erPadding), erMax + erPadding]} width={50} />\n                        <Tooltip contentStyle={{ backgroundColor: isDark ? '#1e293b' : '#fff', border: 'none', borderRadius: '8px', fontSize: '12px' }} />\n                        <Line type=\"monotone\" dataKey=\"value\" stroke=\"#14b8a6\" strokeWidth={2} dot={false} />\n                      <\/LineChart>\n                    <\/ResponsiveContainer>\n                  <\/div>\n                );\n              })()}\n              {(() => {\n                const growthData = filteredData.map((w, i) => ({ label: w.label, value: parseFloat(i > 0 ? (((w.metrics.reach -

    const Icon = ({ name, size = 20, className = "" }) => {
      if (!window.lucide || !window.lucide.icons) return <span style={{ fontSize: 10 }}>?</span>;

      const IconData = window.lucide.icons[name];
      if (!IconData) return null;

      const [tag, attrs, children] = IconData;

      return (
        <svg
          {...attrs}
          width={size}
          height={size}
          className={`lucide lucide-${name.toLowerCase()} ${className}`}
          stroke="currentColor"
        >
          {children.map(([childTag, childAttrs], i) => (
            React.createElement(childTag, { ...childAttrs, key: i })
          ))}
        </svg>
      );
    };

    // Extract Instagram post ID from URL
    const extractInstagramPostId = (url) => {
      if (!url || !url.includes('instagram.com')) return null;
      const match = url.match(/instagram\.com/p/([A-Za-z0-9_-]+)/) || url.match(/instagram\.com/reel/([A-Za-z0-9_-]+)/);
      return match ? match[1] : null;
    };

    // Get Instagram thumbnail URL
    // WARNING: Instagram blocks direct media access via /media/?size=l endpoint
    // This will often fail with 403 Forbidden errors. Graceful fallback is critical.
    const getInstagramThumbnailUrl = (url) => {
      const postId = extractInstagramPostId(url);
      if (!postId) return null;
      // NOTE: This URL pattern is BLOCKED by Instagram in most cases
      // Frontend will display fallback message on error
      return `https://www.instagram.com/p/${postId}/media/?size=l`;
    };

    // --- UTILS ---
    const formatNumber = (num) => {
      if (!num) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return Math.round(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    };

    const calculateAbsolute = (reach, percentage) => Math.round((reach * percentage) / 100);

    // Extract Instagram post ID from URL and create embed URL
    const getInstagramEmbedUrl = (url) => {
      if (!url || !url.includes('instagram.com')) return null;

      const match = url.match(/instagram\.com/p/([A-Za-z0-9_-]+)/) || url.match(/instagram\.com/reel/([A-Za-z0-9_-]+)/);

        return `https://www.instagram.com/p/${match[1]}/embed/`;

            </div>
          </div>
        </div>
      );
    }

    const GoalWidget = ({ label, current, target, targetMonth, isDark }) => {
      return (
        <div className={`mb-4 ${isDark ? 'text-slate-300' : 'text-slate-700'}`}>
          <div className="flex justify-between text-xs font-bold mb-1">
            <span>{label}</span>
            <span className={isDark ? 'text-teal-400' : 'text-blue-600'}>Target ({targetMonth}): {target}%</span>
          </div>
          <div className={`h-3 rounded-full overflow-hidden ${isDark ? 'bg-slate-700' : 'bg-slate-200'}`}>
            <div
              style={{ width: `${Math.min((current / target) * 100, 100)}%` }}
              className={`h-full rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-blue-500 to-indigo-500`}
            ></div>
          </div>
          <div className="text-[10px] text-right mt-1 opacity-70">
            Current: {current}%
          </div>
        </div>
      );
    }

    const MonthlyTargetsWidget = ({ monthlyTargets, selectedMonth, onMonthChange, metrics, isDark, allData }) => {
      const monthOptions = [];
      for (let year = 2025; year <= 2026; year++) {
        const startMonth = year === 2025 ? 9 : 0; // Oct 2025 = month 9, Jan 2026 = month 0
        const endMonth = year === 2026 ? 11 : 11; // Dec = month 11
        for (let month = startMonth; month <= endMonth; month++) {
          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          monthOptions.push(`${monthNames[month]} ${year}`);
        }
      }

      const currentTargets = monthlyTargets[selectedMonth] || { reachPct: 15, engagementPct: 12 };

      // Calculate monthly metrics for selected month
      const monthlyMetrics = useMemo(() => {
        if (!allData || allData.length === 0) return { avgFollowersPct: 0, er: 0 };
        const [monthName, yearStr] = selectedMonth.split(' ');
        const year = parseInt(yearStr);
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const monthIndex = monthNames.indexOf(monthName);

        const monthData = allData.filter(week => {
          const weekDate = new Date(week.startDate);
          return weekDate.getMonth() === monthIndex && weekDate.getFullYear() === year;
        });

        if (monthData.length === 0) return { avgFollowersPct: 0, er: 0 };

        const totalReach = monthData.reduce((sum, w) => sum + w.metrics.reach, 0);
        const totalEngagement = monthData.reduce((sum, w) => sum + w.metrics.engagement, 0);
        const weightedFollowers = monthData.reduce((sum, w) => sum + (w.metrics.reach * w.metrics.followersPct), 0);
        const avgFollowersPct = totalReach > 0 ? (weightedFollowers / totalReach) : 0;
        const er = totalReach > 0 ? (totalEngagement / totalReach) * 100 : 0;

        return { avgFollowersPct: avgFollowersPct.toFixed(2), er: er.toFixed(2) };
      }, [allData, selectedMonth]);

      return (
        <div className={`p-6 rounded-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
          <div className="flex items-center gap-2 mb-4">
            <h3 className={`text-sm font-bold uppercase tracking-wider ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>
              🎯 Monthly Targets
            </h3>
            <InfoTooltip text="Select a month to view its target progress. Targets are set in the Admin Settings." isDark={isDark} />
          </div>
          <div className="mb-4">
            <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>Select Month</label>
            <select
              value={selectedMonth}
              onChange={(e) => onMonthChange(e.target.value)}
              className={`w-full p-2 rounded-lg text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`}
            >
              {monthOptions.map(m =>
                <option key={m} value={m}>{m}</option>
              )}
            </select>
          </div>
          <GoalWidget label="Reach Goal" current={parseFloat(monthlyMetrics.avgFollowersPct)} target={currentTargets.reachPct} targetMonth={selectedMonth} isDark={isDark} />
          <GoalWidget label="Engagement Rate Goal" current={parseFloat(monthlyMetrics.er)} target={currentTargets.engagementPct} targetMonth={selectedMonth} isDark={isDark} />
        </div>
      );
    }

    const ComparisonModal = ({ isOpen, onClose, data, isDark }) => {
      const [mode, setMode] = useState('weeks');
      const [idA, setIdA] = useState('');
      const [idB, setIdB] = useState('');
      const [idC, setIdC] = useState('');

      const monthlyData = useMemo(() => {
        const months = {};
        data.forEach(d => {
          const m = new Date(d.startDate).toLocaleString('en-US', { month: 'short', year: 'numeric' });
          if (!months[m]) months[m] = { label: m, metrics: { reach: 0, engagement: 0, views: 0, profileActivity: 0, count: 0, followersPct: 0 } };
          months[m].metrics.reach += d.metrics.reach;
          months[m].metrics.engagement += d.metrics.engagement;
          months[m].metrics.views += d.metrics.views;
          months[m].metrics.profileActivity += d.metrics.profileActivity;
          months[m].metrics.count++;
        });
        return Object.values(months).map((m, idx) => ({ id: `month-${idx}`, ...m }));
      }, [data]);

      const sourceData = mode === 'weeks' ? data : monthlyData;

      useEffect(() => {
        if (sourceData.length > 0) {
          setIdA(sourceData[0].id);
          if (sourceData.length > 1) setIdB(sourceData[1].id);
          if (sourceData.length > 2) setIdC(sourceData[2].id);
        }
      }, [sourceData, mode]);

      if (!isOpen) return null;

      const itemA = sourceData.find(d => d.id === idA) || sourceData[0];
      const itemB = sourceData.find(d => d.id === idB) || (sourceData.length > 1 ? sourceData[1] : null);
      const itemC = sourceData.find(d => d.id === idC) || (sourceData.length > 2 ? sourceData[2] : null);

      const calcDiff = (valA, valB) => {
        if (!valA || !valB) return { diff: 0, pct: 0 };
        const diff = valB - valA;
        const pct = valA === 0 ? 0 : ((diff / valA) * 100).toFixed(1);
        return { diff, pct };
      }

      const renderRow = (label, valA, valB, valC, format = true) => {
        const diffAB = valB ? calcDiff(valA, valB) : { diff: 0, pct: 0 };
        const diffAC = valC ? calcDiff(valA, valC) : { diff: 0, pct: 0 };
        const isPositiveAB = diffAB.diff >= 0;
        const isPositiveAC = diffAC.diff >= 0;
        return (
          <tr className={`border-b ${isDark ? 'border-slate-700' : 'border-slate-100'}`}>
            <td className={`p-3 text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>{label}</td>
            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{format ? formatNumber(valA) : valA}</td>
            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{valB ? (format ? formatNumber(valB) : valB) : '-'}</td>
            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{valC ? (format ? formatNumber(valC) : valC) : '-'}</td>
            <td className={`p-3 text-sm font-bold text-right ${isPositiveAB ? 'text-green-500' : 'text-red-500'}`}>
              {valB ? `${isPositiveAB ? '+' : ''}${format ? formatNumber(diffAB.diff) : diffAB.diff} (${isPositiveAB ? '+' : ''}${diffAB.pct}%)` : '-'}
            </td>
            <td className={`p-3 text-sm font-bold text-right ${isPositiveAC ? 'text-green-500' : 'text-red-500'}`}>
              {valC ? `${isPositiveAC ? '+' : ''}${format ? formatNumber(diffAC.diff) : diffAC.diff} (${isPositiveAC ? '+' : ''}${diffAC.pct}%)` : '-'}
            </td>
          </tr>
        )
      }

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
          <div className={`w-full max-w-5xl p-6 rounded-3xl shadow-2xl border flex flex-col max-h-[90vh] ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>
            <div className="flex justify-between items-center mb-6">
              <h3 className={`text-xl font-bold flex items-center gap-2 ${isDark ? 'text-white' : 'text-slate-900'}`}>
                🔄 Comparison
              </h3>
              <div className={`flex rounded-lg p-1 ${isDark ? 'bg-slate-900' : 'bg-slate-100'}`}>
                <button onClick={() => setMode('weeks')} className={`px-3 py-1 text-xs font-bold rounded ${mode === 'weeks' ? (isDark ? 'bg-teal-600 text-white' : 'bg-white shadow') : 'text-slate-500'}`}>Weeks</button>
                <button onClick={() => setMode('months')} className={`px-3 py-1 text-xs font-bold rounded ${mode === 'months' ? (isDark ? 'bg-teal-600 text-white' : 'bg-white shadow') : 'text-slate-500'}`}>Months</button>
              </div>
              <button onClick={onClose} className={`p-2 rounded-full hover:bg-slate-500/20 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>✕</button>
            </div>
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div><select value={idA} onChange={e => setIdA(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}</select></div>
              <div><select value={idB} onChange={e => setIdB(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}</select></div>
              <div><select value={idC} onChange={e => setIdC(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}</select></div>
            </div>
            <div className={`rounded-xl overflow-hidden overflow-y-auto flex-1 border ${isDark ? 'border-slate-700 bg-slate-900/50' : 'border-slate-200 bg-slate-50'}`}>
              <table className="w-full text-left">
                <thead className={isDark ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-500'}>
                  <tr>
                    <th className="p-3 text-xs uppercase">Metric</th>
                    <th className="p-3 text-right text-xs uppercase">{itemA?.label}</th>
                    <th className="p-3 text-right text-xs uppercase">{itemB?.label || '-'}</th>
                    <th className="p-3 text-right text-xs uppercase">{itemC?.label || '-'}</th>
                    <th className="p-3 text-right text-xs uppercase">Delta A→B</th>
                    <th className="p-3 text-right text-xs uppercase">Delta A→C</th>
                  </tr>
                </thead>
                <tbody>
                  {itemA && (<>
                    {renderRow("Total Reach", itemA.metrics.reach, itemB?.metrics.reach, itemC?.metrics.reach)}
                    {renderRow("Engagement", itemA.metrics.engagement, itemB?.metrics.engagement, itemC?.metrics.engagement)}
                    {renderRow("Views", itemA.metrics.views, itemB?.metrics.views, itemC?.metrics.views)}
                    {renderRow("Profile Activity", itemA.metrics.profileActivity, itemB?.metrics.profileActivity, itemC?.metrics.profileActivity)}
                  </>)}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )
    };

    const ExportModal = ({ isOpen, onClose, isDark, allData, currentTimeRange, onTimeRangeChange }) => {
      const [exportTimeRange, setExportTimeRange] = useState(currentTimeRange);

      if (!isOpen) return null;

      const filterDataByRange = (data, range) => {
        const today = new Date('2025-12-31');
        return data.filter(item => {
          const itemDate = new Date(item.startDate);
          const diffDays = Math.ceil(Math.abs(today - itemDate) / (1000 * 60 * 60 * 24));
          switch (range) {
            case 'last_week': return diffDays <= 7;
            case 'current_month': return itemDate.getMonth() === today.getMonth() && itemDate.getFullYear() === today.getFullYear();
            case 'last_30_days': return diffDays <= 30;
            case 'prev_month': return itemDate.getMonth() === today.getMonth() - 1;
            case 'last_3_months': return diffDays <= 90;
            case 'last_6_months': return diffDays <= 180;
            case 'last_9_months': return diffDays <= 270;
            case 'last_1_year': return diffDays <= 365;
            default: return true;
          }
        });
      };

      const handlePDFDownload = () => {
        if (typeof google !== 'undefined' && google.script) {
          const btn = document.getElementById('pdf-btn');
          if (btn) btn.innerText = "Generating PDF...";

          google.script.run
            .withSuccessHandler((url) => {
              window.open(url, '_blank');
              onClose();
            })
            .withFailureHandler((e) => {
              alert("Error creating PDF: " + e);
              onClose();
            })
            .createPdfReport();
        } else {
          alert("PDF Download only works inside Google Apps Script deployment.");
          onClose();
        }
      };

      const handleCSVDownload = () => {
        const filteredData = filterDataByRange(allData, exportTimeRange);
        const csvData = generateCSV(filteredData);
        const blob = new Blob([csvData], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `JOY_Report_${exportTimeRange.replace(/_/g, '_')}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
        onClose();
      };

      const getRangeLabel = (range) => {
        const labels = {
          'last_week': 'Last Week',
          'current_month': 'Current Month',
          'prev_month': 'Previous Month',
          'last_30_days': 'Last 30 Days',
          'last_3_months': 'Last 3 Months',
          'last_6_months': 'Last 6 Months',
          'last_9_months': 'Last 9 Months',
          'last_1_year': 'Last 1 Year'
        };
        return labels[range] || range;
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
          <div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>
            <div className="flex items-center gap-3 mb-6">
              <div className={`p-3 rounded-full ${isDark ? 'bg-red-500/20 text-red-400' : 'bg-red-100 text-red-600'}`}><span className="text-2xl">⬇️</span></div>
              <div><h3 className={`text-xl font-bold ${isDark ? 'text-white' : 'text-slate-900'}`}>Export Options</h3></div>
            </div>
            <div className={`p-4 rounded-xl mb-6 border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>
              <label className={`block text-xs font-bold uppercase tracking-wider mb-2 ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Select Time Range</label>
              <select
                value={exportTimeRange}
                onChange={(e) => setExportTimeRange(e.target.value)}
                className={`w-full p-3 rounded-lg text-sm border outline-none ${isDark ? 'bg-slate-800 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`}
              >
                <option value="last_week">Last Week</option>
                <option value="current_month">Current Month</option>
                <option value="prev_month">Previous Month</option>
                <option value="last_30_days">Last 30 Days</option>
                <option value="last_3_months">Last 3 Months</option>
                <option value="last_6_months">Last 6 Months</option>
                <option value="last_9_months">Last 9 Months</option>
                <option value="last_1_year">Last 1 Year</option>
              </select>
              <div className="mt-2 text-xs text-slate-500">Selected: {getRangeLabel(exportTimeRange)}</div>
            </div>
            <div className="space-y-3">
              <button id="pdf-btn" onClick={handlePDFDownload} className="w-full py-3 text-sm font-bold rounded-xl bg-gradient-to-r from-red-500 to-red-600 text-white hover:from-red-600 hover:to-red-700 shadow-lg shadow-red-500/30 flex items-center justify-center gap-2">📥 Download Database PDF (Raw Spreadsheet)</button>
              <button onClick={handleCSVDownload} className={`w-full py-3 text-sm font-bold rounded-xl border flex items-center justify-center gap-2 ${isDark ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-200 text-slate-700 hover:bg-slate-50'}`}>📄 Download CSV (Raw Data)</button>
              <button onClick={onClose} className={`w-full py-3 text-sm font-bold rounded-xl ${isDark ? 'text-slate-500 hover:text-slate-300' : 'text-slate-400 hover:text-slate-600'}`}>Cancel</button>
            </div>
          </div>
        </div>
      )
    };

    // --- GROWTH TRACKING COMPONENT ---
    const getMonthAbbreviation = (monthName) => {
      const monthMap = {
        'January': 'JAN', 'February': 'FEB', 'March': 'MAR', 'April': 'APR',
        'May': 'MAY', 'June': 'JUN', 'July': 'JUL', 'August': 'AUG',
        'September': 'SEP', 'October': 'OCT', 'November': 'NOV', 'December': 'DEC'
      };
      return monthMap[monthName] || monthName.substring(0, 3).toUpperCase();
    };

    const formatMonthForDisplay = (monthStr) => {
      // Convert "October 2025" to "October 2025" format (already correct)
      // But handle if it comes as a Date object
      if (monthStr instanceof Date) {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        return `${monthNames[monthStr.getMonth()]} ${monthStr.getFullYear()}`;
      }
      return monthStr;
    };

    const getMonthAbbrevWithYear = (monthStr) => {
      // Convert "October 2025" to "OCT-25"
      const parts = monthStr.split(' ');
      if (parts.length === 2) {
        const monthName = parts[0];
        const year = parts[1];
        const abbrev = getMonthAbbreviation(monthName);
        const yearShort = year.length === 4 ? year.substring(2) : year;
        return `${abbrev}-${yearShort}`;
      }
      // If it's a Date object
      if (monthStr instanceof Date) {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const monthName = monthNames[monthStr.getMonth()];
        const year = monthStr.getFullYear().toString();
        const abbrev = getMonthAbbreviation(monthName);
        return `${abbrev}-${year.substring(2)}`;
      }
      return monthStr;
    };

    const GrowthTracking = ({ isDark, onBack }) => {
      const [growthData, setGrowthData] = useState([
        { month: 'October 2025', instagram: 12500, tiktok: 3200, linkedin: 1800, posts: 45, totalFollowers: 17500 },
        { month: 'November 2025', instagram: 13200, tiktok: 3500, linkedin: 1950, posts: 52, totalFollowers: 18650 },
        { month: 'December 2025', instagram: 14500, tiktok: 3800, linkedin: 2100, posts: 48, totalFollowers: 20400 }
      ]);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ month: '', instagram: 0, tiktok: 0, linkedin: 0, posts: 0, totalFollowers: 0 });

      useEffect(() => {
        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((data) => {
              if (data && data.length > 0) {
                // Normalize month format to "Month Year" and ensure posts field exists
                const normalizedData = data.map(item => {
                  let month = item.month;
                  // Convert date strings to "Month Year" format
                  if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {
                    try {
                      const date = new Date(month);
                      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                      month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
                    } catch (e) {
                      // Keep original if parsing fails
                    }
                  }
                  return {
                    ...item,
                    month: month,
                    posts: item.posts || 0
                  };
                });
                setGrowthData(normalizedData);
              }
            })
            .getGrowthData();
        }
      }, []);

      const handleAdd = () => {
        const newMonth = prompt('Enter month (e.g., January 2026):');
        if (!newMonth) return;
        // Ensure format is "Month Year"
        let formattedMonth = newMonth.trim();
        // Convert date strings to "Month Year" format if needed
        if (formattedMonth.includes('GMT') || formattedMonth.includes('T00:00:00') || formattedMonth.includes('Wed') || formattedMonth.includes('Sat') || formattedMonth.includes('Mon') || formattedMonth.includes('Thu')) {
          try {
            const date = new Date(formattedMonth);
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            formattedMonth = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
          } catch (e) {
            // Keep original if parsing fails
          }
        }
        setForm({ month: formattedMonth, instagram: 0, tiktok: 0, linkedin: 0, posts: 0, totalFollowers: 0 });
        setEditing('new');
      };

      const handleEdit = (item) => {
        // Normalize month format
        let month = item.month;
        if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {
          try {
            const date = new Date(month);
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
          } catch (e) {
            // Keep original if parsing fails
          }
        }
        setForm({ ...item, month: month, posts: item.posts || 0 });
        setEditing(month);
      };

      const sortGrowthData = (data) => {
        return [...data].sort((a, b) => {
          const dateA = new Date(a.month);
          const dateB = new Date(b.month);
          return dateA - dateB;
        });
      };

      const handleSave = () => {
        // Normalize month format before saving
        let normalizedForm = { ...form };
        if (normalizedForm.month.includes('GMT') || normalizedForm.month.includes('T00:00:00') || normalizedForm.month.includes('Wed') || normalizedForm.month.includes('Sat') || normalizedForm.month.includes('Mon') || normalizedForm.month.includes('Thu')) {
          try {
            const date = new Date(normalizedForm.month);
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            normalizedForm.month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
          } catch (e) {
            // Keep original if parsing fails
          }
        }

        let newData;
        if (editing === 'new') {
          newData = sortGrowthData([...growthData, normalizedForm]);
          setGrowthData(newData);
        } else {
          newData = growthData.map(m => {
            // Normalize existing months too
            let month = m.month;
            if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {
              try {
                const date = new Date(month);
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
              } catch (e) { }
            }
            return month === editing ? normalizedForm : { ...m, month: month };
          });
          setGrowthData(sortGrowthData(newData));
        }

        if (typeof google !== 'undefined' && google.script) {

    // --- SETTINGS MONTH SELECTOR (GRID VIEW) ---
    const SettingsMonthSelector = ({ targets, setTargets, isDark, onSave }) => {

      const generatedMonths = [];
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

      for (let year = 2025; year <= 2026; year++) {
        const startMonth = year === 2025 ? 9 : 0; // Start Oct 2025
        const endMonth = 11;
        for (let month = startMonth; month <= endMonth; month++) {
          generatedMonths.push(`${monthNames[month]} ${year}`);
        }
      }

      // 2. Merge with any existing keys in targets that might not be in our generated list
      // STRICT FILTERING: Only allow keys that strictly match "Month Year" format (e.g. "October 2025")
      // This prevents "Wed Oct 01..." garbage from showing up in the UI
      const validKeyRegex = /^[A-Z][a-z]+ \d{4}$/;
      const extraKeys = Object.keys(targets).filter(k => validKeyRegex.test(k));

      const allKeys = Array.from(new Set([...generatedMonths, ...extraKeys]));

      // 3. Sort chronologically
      const sortedMonths = allKeys.sort((a, b) => new Date(a) - new Date(b));

      return (

    // --- BACKEND CMS (FORM INPUT) ---
    const BackendCMS = ({ data, setData, isDark, onBack, targets, setTargets }) => {

      const [isSaving, setIsSaving] = useState(false);

      const handleEdit = (weekId) => {
        const weekData = data.find(d => d.id === weekId);
        if (!weekData) {
          alert("Week data not found");
          return;
        }
        setEditingId(weekId);
        // Deep clone to ensure all nested objects are preserved
        const safeData = JSON.parse(JSON.stringify(weekData));
        // Ensure links are preserved (not defaulted to '#' or empty)
        if (safeData.winningContent && !safeData.winningContent.link) {
          safeData.winningContent.link = '';
        }
        if (safeData.losingContent && !safeData.losingContent.link) {
          safeData.losingContent.link = '';
        }
        setFormData(safeData);
      };

      const handleDelete = (weekId) => {
        const weekLabel = data.find(d => d.id === weekId)?.label || weekId;
        if (!confirm(`Are you sure you want to delete ${weekLabel}?\
\
This action cannot be undone.`)) return;

        // CRITICAL: Work with current data state
        const currentData = data && data.length > 0 ? [...data] : [];
        const newData = currentData.filter(item => item.id !== weekId);

        console.log("Deleting week. Before:", currentData.length, "After:", newData.length);

        if (typeof google !== 'undefined' && google.script) {
          // Update local state immediately for better UX
          setData(newData);

          google.script.run
            .withSuccessHandler((result) => {
              console.log("Delete successful:", result);
              // Immediately reload to verify
              google.script.run
                .withSuccessHandler((serverData) => {
                  console.log("Verification after delete - received", serverData ? serverData.length : 0, "weeks");
                  if (serverData && Array.isArray(serverData)) {
                    setData(serverData);
                    alert("✅ Week deleted successfully! (" + serverData.length + " weeks remaining)");
                  } else {
                    alert("✅ Week deleted! (" + newData.length + " weeks remaining)");
                  }
                })
                .withFailureHandler((e) => {
                  console.error("Verification failed:", e);
                  alert("✅ Week deleted! (Please use refresh button to verify)");
                })
                .getWeeklyData();
            })
            .withFailureHandler((e) => {
              console.error("Delete failed:", e);
              alert("❌ Failed to delete from database: " + e);
              // Revert to original data on error
              setData(currentData);
            })
            .saveWeeklyData(newData);
        } else {
          setData(newData);
          alert("Week deleted locally (Demo)");
        }
      };

      const handleAddNew = () => {
        setShowAddWeekModal(true);
        // Calculate next week based on last week in data
        if (data.length > 0) {
          const lastWeek = data[data.length - 1];
          const lastDate = new Date(lastWeek.startDate);
          const nextWeekStart = new Date(lastDate);
          nextWeekStart.setDate(lastDate.getDate() + 7);
          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
          setNewWeekForm({
            weekNumber: 1,
            month: monthNames[nextWeekStart.getMonth()],
            year: nextWeekStart.getFullYear()
          });
        }
      };

      const handleCreateWeek = () => {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const monthIndex = monthNames.indexOf(newWeekForm.month);
        if (monthIndex === -1) { alert("Invalid month"); return; }

        const year = newWeekForm.year;
        const weekNum = newWeekForm.weekNumber;

        // HELPER: Get Calendar Week Date Range
        // Week 1: 1st of month -> First Saturday (or end of month if shorter)
        // Week 2+: Sunday -> Saturday (or end of month)

        let startDate, endDate;
        const firstDayOfMonth = new Date(year, monthIndex, 1);
        const lastDayOfMonth = new Date(year, monthIndex + 1, 0);

        // Find end of first week (First Saturday)
        let endOfWeek1 = new Date(firstDayOfMonth);
        while (endOfWeek1.getDay() !== 6 && endOfWeek1 < lastDayOfMonth) {
          endOfWeek1.setDate(endOfWeek1.getDate() + 1);
        }

        if (weekNum === 1) {
          startDate = firstDayOfMonth;
          endDate = endOfWeek1;
        } else {
          // Calculate start of requested week
          // Start = End of Week 1 + 1 day + (weekNum - 2) * 7 days
          let currentStart = new Date(endOfWeek1);
          currentStart.setDate(currentStart.getDate() + 1); // Start of Week 2 (Sunday)

          // Jump to the specific week
          currentStart.setDate(currentStart.getDate() + (weekNum - 2) * 7);

          if (currentStart > lastDayOfMonth) {
            alert(`Week ${weekNum} is out of range for ${newWeekForm.month} ${year}.`);
            return;
          }

          startDate = currentStart;

          // End date is start + 6 days (Saturday) OR last day of month
          let currentEnd = new Date(startDate);
          currentEnd.setDate(currentEnd.getDate() + 6);

          if (currentEnd > lastDayOfMonth) {
            currentEnd = lastDayOfMonth;
          }
          endDate = currentEnd;
        }

        const monthAbbrevs = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const monthAbbrev = monthAbbrevs[monthIndex];

        // Format: "OCT 01 - OCT 04" or "OCT 05 - OCT 11"
        const dateRange = `${monthAbbrev} ${String(startDate.getDate()).padStart(2, '0')} - ${monthAbbrevs[endDate.getMonth()]} ${String(endDate.getDate()).padStart(2, '0')}`;

        // Label: "WEEK 1 OCT"
        const label = `WEEK ${weekNum} ${monthAbbrev}`;

        const newId = `week-${weekNum}-${monthAbbrev.toLowerCase()}-${year}`;

        const newWeek = {
          id: newId,
          startDate: startDate.toISOString().split('T')[0],
          label: label,
          dateRange: dateRange,
          metrics: {
            reach: 0,
            engagement: 0,
            views: 0,
            profileActivity: 0,
            followersPct: 0,
            nonFollowersPct: 100,
            storiesPct: 0,
            reelsPct: 0,
            feedsPct: 0
          },
          winningContent: {
            type: 'IGR',
            title: '',
            thumbnail: '',
            link: '', // Empty string, not '#'
            analysis: { what: '', why: '', todo: '' }
          },
          losingContent: {
            type: 'IGR',
            title: '',
            thumbnail: '',
            link: '', // Empty string, not '#'
            analysis: { what: '', why: '', todo: '' }
          }
        };

        // Ensure metrics are initialized to 0 explicitly to avoid "100%" ghost issue
        newWeek.metrics = {
          reach: 0, engagement: 0, views: 0, profileActivity: 0,
          followersPct: 0, nonFollowersPct: 0, // Explicitly 0
          storiesPct: 0, reelsPct: 0, feedsPct: 0
        };

        setShowAddWeekModal(false);
        setEditingId(newId);
        setFormData(newWeek);
      };

      const handleSave = () => {

          alert("⚠️ Please wait - Save in progress...");
          return;
        }

        if (!formData || !formData.metrics) {
          alert("Form data is missing. Please check all fields are filled correctly.");
          return;
        }

        if (formData.metrics.reach < 0) {
          alert("Reach cannot be negative");
          return;
        }

        // Ensure all required fields are present and properly formatted
        const sanitizedFormData = {
          id: String(formData.id || editingId || `week-${Date.now()}`).trim(),
          startDate: String(formData.startDate || '').trim(),
          label: String(formData.label || '').trim(),
          dateRange: String(formData.dateRange || '').trim(),
          metrics: {
            reach: Number(formData.metrics.reach) || 0,
            engagement: Number(formData.metrics.engagement) || 0,
            views: Number(formData.metrics.views) || 0,
            profileActivity: Number(formData.metrics.profileActivity) || 0,
            followersPct: Number(formData.metrics.followersPct) || 0,
            nonFollowersPct: Number(formData.metrics.nonFollowersPct) || 0,
            storiesPct: Number(formData.metrics.storiesPct) || 0,
            reelsPct: Number(formData.metrics.reelsPct) || 0,
            feedsPct: Number(formData.metrics.feedsPct) || 0
          },
          winningContent: {
            type: String(formData.winningContent?.type || 'IGR').trim(),
            title: String(formData.winningContent?.title || '').trim(),
            thumbnail: '',
            link: formData.winningContent?.link !== undefined && formData.winningContent?.link !== null && formData.winningContent?.link !== '#'
              ? String(formData.winningContent.link).trim()
              : '',
            analysis: {
              what: String(formData.winningContent?.analysis?.what || '').trim(),
              why: String(formData.winningContent?.analysis?.why || '').trim(),
              todo: String(formData.winningContent?.analysis?.todo || '').trim()
            }
          },
          losingContent: {
            type: String(formData.losingContent?.type || 'IGR').trim(),
            title: String(formData.losingContent?.title || '').trim(),
            thumbnail: '',
            link: formData.losingContent?.link !== undefined && formData.losingContent?.link !== null && formData.losingContent?.link !== '#'

              : '',
            analysis: {

Please use Refresh button to reload data from database.");

" + newData.length + " weeks saved\

" + newData.length + " weeks saved\

" + e + "\

                                className={`px-5 py-2.5 rounded-xl font-bold text-sm transition ${isSaving
                                    ? 'bg-slate-300 text-slate-400 cursor-not-allowed'
                                    : 'bg-slate-500 text-white hover:bg-slate-600'
                                  }`}
                              >
                                ✏️ Edit
                              </button>
                              <button
                                onClick={() => handleDelete(week.id)}
                                disabled={isSaving}
                                className={`px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition ${isSaving
                                    ? 'bg-slate-300 text-slate-400 cursor-not-allowed'
                                    : (isDark ? 'bg-red-500/20 text-red-400 hover:bg-red-500/30' : 'bg-red-50 text-red-600 hover:bg-red-100')
                                  }`}
                              >
                                🗑️ Delete
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    ));
                  })()}
                </div>
              )}
            </>
          )}
          <footer className={`mt-12 py-8 text-center border-t ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
            <p className={`text-sm font-medium ${isDark ? 'text-slate-100' : 'text-slate-900'}`}>Made by CMO JOY - Muhammad Nurul Qolbi</p>
            <a href="http://instagram.com/biyoosh.i/" target="_blank" rel="noreferrer" className="text-xs text-blue-500 hover:text-blue-400 mt-1 inline-flex items-center gap-1">📷 @biyoosh.i</a>
          </footer>
        </div>
      )
    };



    // --- MAIN COMPONENT ---
    function App() {

      const [targets, setTargets] = useState({});
      const [allGrowthData, setAllGrowthData] = useState([]);
      const [selectedTargetMonth, setSelectedTargetMonth] = useState('December');

      const loadDataFromServer = () => {
        if (typeof google !== 'undefined' && google.script) {
          console.log("Loading data from Google Apps Script...");
          google.script.run
            .withSuccessHandler((serverData) => {
              console.log("Received data from server:", serverData);
              // ALWAYS use server data, even if empty - NEVER fall back to mock data
              if (serverData && Array.isArray(serverData)) {
                // Ensure all links are properly loaded (not '#')
                const cleanedData = serverData.map(item => ({
                  ...item,
                  winningContent: {
                    ...item.winningContent,
                    link: item.winningContent?.link === '#' ? '' : (item.winningContent?.link || ''),
                    thumbnail: '' // Always empty, not used
                  },
                  losingContent: {
                    ...item.losingContent,
                    link: item.losingContent?.link === '#' ? '' : (item.losingContent?.link || ''),
                    thumbnail: '' // Always empty, not used
                  }
                }));
                setData(cleanedData);
                console.log("Data loaded and cleaned:", cleanedData.length, "weeks");
              } else {
                console.log("Server returned invalid data, using empty array");
                setData([]);
              }
              setLoading(false);
            })
            .withFailureHandler((e) => {
              console.error("Failed to load weekly data:", e);
              // On error, keep empty array - NEVER use mock data when connected to server
              setData([]);
              setLoading(false);
              alert("Failed to load data from database. Please refresh the page.");
            })
            .getWeeklyData();

          google.script.run
            .withSuccessHandler((monthlyTargets) => {
              setTargets(monthlyTargets || {});
              // Set default selected month to current month
              const now = new Date();
              const monthName = now.toLocaleString('en-US', { month: 'long' });
              const year = now.getFullYear();
              setSelectedTargetMonth(`${monthName} ${year}`);
            })
            .withFailureHandler((e) => {
              console.error("Failed to load targets:", e);
              setTargets({});
            })
            .getTargets();

          google.script.run
            .withSuccessHandler((gData) => {
              if (gData && Array.isArray(gData)) {
                setAllGrowthData(gData);
              }
            })
            .getGrowthData();
        } else {
          // Demo mode - use initial data only if no server available
          console.log("Running in demo mode (no Google Apps Script)");
          // Ensure metrics are initialized to 0 explicitly to avoid "100%" ghost issue
          // Also ensure content structure is robust
          const cleanData = initialWeeklyData.map(item => ({
            ...item,
            metrics: {
              reach: item.metrics?.reach || 0,
              engagement: item.metrics?.engagement || 0,
              views: item.metrics?.views || 0,
              profileActivity: item.metrics?.profileActivity || 0,
              followersPct: item.metrics?.followersPct || 0,
              nonFollowersPct: item.metrics?.nonFollowersPct || 0,
              storiesPct: item.metrics?.storiesPct || 0,
              reelsPct: item.metrics?.reelsPct || 0,
              feedsPct: item.metrics?.feedsPct || 0
            },
            winningContent: {
              ...item.winningContent,
              link: item.winningContent?.link || ''
            },
            losingContent: {
              ...item.losingContent,
              link: item.losingContent?.link || ''
            }
          }));

          setData(cleanData);
          setLoading(false);
        }
      };

      useEffect(() => {
        loadDataFromServer();
      }, []);

      // QUOTA OPTIMIZATION: Reduced auto-refresh to 5 minutes (from 60s)
      // Prevents Google Apps Script quota exhaustion with multiple users
      useEffect(() => {
        if (typeof google !== 'undefined' && google.script && viewMode === 'frontend') {
          const interval = setInterval(() => {
            console.log("🔄 Auto-refreshing data... (5 min interval)");
            loadDataFromServer();
          }, 300000); // 5 minutes = 300000ms (was 60000ms)

          return () => clearInterval(interval);
        }
      }, [viewMode]);

      // Reload data when returning from backend view to ensure sync
      useEffect(() => {
        if (viewMode === 'frontend' && !loading) {
          // Small delay to ensure backend operations complete
          const timer = setTimeout(() => {
            loadDataFromServer();
          }, 500);
          return () => clearTimeout(timer);
        }
      }, [viewMode]);

      const filteredData = useMemo(() => {
        const today = new Date('2025-12-31');
        return data.filter(item => {
          const itemDate = new Date(item.startDate);
          const diffDays = Math.ceil(Math.abs(today - itemDate) / (1000 * 60 * 60 * 24));
          switch (timeRange) {
            case 'last_week': return diffDays <= 7;
            case 'current_month': return itemDate.getMonth() === today.getMonth() && itemDate.getFullYear() === today.getFullYear();
            case 'last_30_days': return diffDays <= 30;
            case 'prev_month': return itemDate.getMonth() === today.getMonth() - 1;
            case 'last_3_months': return diffDays <= 90;
            case 'last_6_months': return diffDays <= 180;
            case 'last_9_months': return diffDays <= 270;
            case 'last_1_year': return diffDays <= 365;
            default: return true;
          }
        });
      }, [data, timeRange]);

      const metrics = useMemo(() => {
        if (filteredData.length === 0) return { reach: 0, views: 0, er: 0, growth: 0, engagement: 0 };
        const reach = filteredData.reduce((acc, curr) => acc + curr.metrics.reach, 0);
        const views = filteredData.reduce((acc, curr) => acc + curr.metrics.views, 0);
        const engagement = filteredData.reduce((acc, curr) => acc + curr.metrics.engagement, 0);
        const er = reach > 0 ? (engagement / reach) * 100 : 0;
        let growth = 0;

        if (data.length > filteredData.length) {
          const prevReach = data[0].metrics.reach;
          if (prevReach > 0) {
            growth = ((reach - prevReach) / prevReach) * 100;
          } else {
            growth = 0; // Avoid Infinity
          }
        }
        return { reach, views, er: er.toFixed(2), engagement, growth: growth.toFixed(1) };
      }, [filteredData, data]);

      const periodContent = useMemo(() => {
        if (filteredData.length === 0) return { winning: null, losing: null };
        const sorted = [...filteredData].sort((a, b) => b.metrics.engagement - a.metrics.engagement);
        let label = "Selected Period";
        if (timeRange === 'current_month') label = "December";
        if (timeRange === 'prev_month') label = "November";
        if (timeRange === 'last_week') label = sorted[0].label;
        return { winning: { ...sorted[0], label }, losing: { ...sorted[sorted.length - 1], label } };
      }, [filteredData, timeRange]);

      const followerGrowth = useMemo(() => {
        if (!allGrowthData || allGrowthData.length === 0) return { pct: 0, label: 'vs Previous', value: 0 };

        // Helper to find data by month/year
        const findData = (monthName, year) => {
          const searchStr = `${monthName} ${year}`;
          return allGrowthData.find(d => d.month === searchStr);
        };

        const today = new Date('2025-12-31'); // Fixed reference date as per app logic
        let targetDate = new Date(today);
        let baselineDate = new Date(today);

        // Determine Baseline Shift based on Range
        // Logic: Compare "Target Period End" vs "Target Period Start (or Before)"
        switch (timeRange) {
          case 'prev_month':
            // Target: Nov 2025, Baseline: Oct 2025
            targetDate.setMonth(today.getMonth() - 1);
            baselineDate.setMonth(today.getMonth() - 2);
            break;
          case 'last_3_months':
            // Target: Dec 2025, Baseline: Sept 2025 (3 months ago)
            baselineDate.setMonth(today.getMonth() - 3);
            break;
          case 'last_6_months':
            baselineDate.setMonth(today.getMonth() - 6);
            break;
          case 'last_9_months':
            baselineDate.setMonth(today.getMonth() - 9);
            break;
          case 'last_1_year':
            baselineDate.setFullYear(today.getFullYear() - 1);
            break;
          case 'current_month':
          case 'last_week':
          case 'last_30_days':
          default:
            // Default: Current Month vs Previous Month
            // Target: Dec 2025, Baseline: Nov 2025
            baselineDate.setMonth(today.getMonth() - 1);
            break;
        }

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        const targetMonthName = monthNames[targetDate.getMonth()];
        const targetYear = targetDate.getFullYear();
        const baselineMonthName = monthNames[baselineDate.getMonth()];
        const baselineYear = baselineDate.getFullYear();

        const targetEntry = findData(targetMonthName, targetYear);
        const baselineEntry = findData(baselineMonthName, baselineYear);

        const currentTotal = targetEntry ? (targetEntry.totalFollowers || 0) : 0;
        const prevTotal = baselineEntry ? (baselineEntry.totalFollowers || 0) : 0;

        let pct = 0;
        if (prevTotal > 0) {
          pct = ((currentTotal - prevTotal) / prevTotal) * 100;
        } else if (currentTotal > 0 && prevTotal === 0) {
          pct = 100; // New growth from 0
        }

        const label = `vs ${baselineMonthName.substr(0, 3)} '${String(baselineYear).substr(2)}`;

        return { pct: pct.toFixed(1), label, value: currentTotal };
      }, [allGrowthData, timeRange]);

      const toggleTheme = () => {
        setIsDark(!isDark);
        document.documentElement.classList.toggle('dark', !isDark);
      };

      if (loading) {

              <button onClick={() => setViewMode('backend')} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl border transition hover:bg-opacity-80 font-bold text-sm ${isDark ? 'bg-teal-600 text-white border-teal-500 shadow-lg shadow-teal-500/20' : 'bg-slate-900 text-white border-slate-800'}`}>👤 <span className="hidden md:inline">Admin</span></button>
            </div>

                );

              {(() => {

              })()}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="flex-shrink-0"><ContentCard item={periodContent.winning} isDark={isDark} type="winning" periodLabel={periodContent.winning?.label} /></div>
              <div className="flex-shrink-0"><ContentCard item={periodContent.losing} isDark={isDark} type="losing" periodLabel={periodContent.losing?.label} /></div>
            </div>

            <div className={`rounded-3xl border overflow-hidden ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-sm'}`}>
              <div className={`p-6 border-b flex justify-between items-center ${isDark ? 'border-slate-700' : 'border-slate-200'}`}><h3 className={`font-bold ${isDark ? 'text-white' : 'text-slate-900'}`}>Detailed Breakdown</h3></div>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm">
                  <thead className={`uppercase text-xs font-bold ${isDark ? 'bg-slate-900/50 text-slate-400' : 'bg-slate-50 text-slate-500'}`}>
                    <tr>
                      <th className="p-3 flex items-center gap-1">Period <InfoTooltip text="Data range for this row. Shows the week label and date range for the performance data." isDark={isDark} /></th>
                      <th className="p-3 text-right">Reach <InfoTooltip text="Total Accounts Reached. This is the total number of unique accounts that saw your content, sourced from Instagram Professional Dashboard > Accounts Reached." isDark={isDark} /></th>
                      <th className="p-3 text-right">Engagement <InfoTooltip text="Total Interactions. Source: IG Pro Dashboard > Total Interactions." isDark={isDark} /></th>
                      <th className="p-3 text-right">Views <InfoTooltip text="Total Impressions. Source: IG Pro Dashboard > Impressions." isDark={isDark} /></th>
                      <th className="p-3 text-right">Profile Activity <InfoTooltip text="Profile Activity metric. Source: IG Pro Dashboard > Profile Activity." isDark={isDark} /></th>
                      <th className="p-3 text-right">Eng. Rate <InfoTooltip text="Engagement Rate value comes from (Engagement / Reach) * 100. This shows the percentage of people who engaged with your content out of total reach." isDark={isDark} /></th>
                      <th className="p-3 text-right">Followers % <InfoTooltip text="Percentage of reach that came from followers." isDark={isDark} /></th>
                      <th className="p-3 text-right">Non-Followers % <InfoTooltip text="Percentage of reach that came from non-followers." isDark={isDark} /></th>
                      <th className="p-3 text-right">Stories % <InfoTooltip text="Percentage of reach from Stories." isDark={isDark} /></th>
                      <th className="p-3 text-right">Reels % <InfoTooltip text="Percentage of reach from Reels." isDark={isDark} /></th>
                      <th className="p-3 text-right">Feeds % <InfoTooltip text="Percentage of reach from Feed posts." isDark={isDark} /></th>
                      <th className="p-3 text-right">Total Score <InfoTooltip text="Sum of Reach + Profile Activity + Engagement. This is a comprehensive metric combining all engagement channels." isDark={isDark} /></th>
                    </tr>
                  </thead>
                  <tbody className={`divide-y ${isDark ? 'divide-slate-700' : 'divide-slate-100'}`}>
                    {filteredData.map(week => {
                      const reach = week.metrics.reach;
                      const totalSum = reach + week.metrics.profileActivity + week.metrics.engagement;
                      const er = ((week.metrics.engagement / reach) * 100).toFixed(2);
                      return (
                        <tr key={week.id} className={`transition hover:bg-opacity-50 ${isDark ? 'hover:bg-slate-700' : 'hover:bg-slate-50'}`}>
                          <td className="p-3"><div className={`font-bold ${isDark ? 'text-teal-400' : 'text-blue-600'}`}>{week.label}</div><div className="text-xs text-slate-500">{week.dateRange}</div></td>
                          <td className="p-3 text-right font-medium">{formatNumber(reach)}</td>
                          <td className="p-3 text-right">{formatNumber(week.metrics.engagement)}</td>
                          <td className="p-3 text-right">{formatNumber(week.metrics.views)}</td>
                          <td className="p-3 text-right">{formatNumber(week.metrics.profileActivity)}</td>
                          <td className="p-3 text-right font-bold text-orange-400">{er}%</td>
                          <td className="p-3 text-right">{week.metrics.followersPct}%</td>
                          <td className="p-3 text-right">{week.metrics.nonFollowersPct}%</td>
                          <td className="p-3 text-right">{week.metrics.storiesPct}%</td>
                          <td className="p-3 text-right">{week.metrics.reelsPct}%</td>
                          <td className="p-3 text-right">{week.metrics.feedsPct}%</td>
                          <td className="p-3 text-right font-bold">{formatNumber(totalSum)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </main>

          <footer className={`mt-12 py-8 text-center border-t ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
            <p className={`text-sm font-medium ${isDark ? 'text-slate-100' : 'text-slate-900'}`}>Made by CMO JOY - Muhammad Nurul Qolbi</p>
            <a href="http://instagram.com/biyoosh.i/" target="_blank" rel="noreferrer" className="text-xs text-blue-500 hover:text-blue-400 mt-1 inline-flex items-center gap-1">📷 @biyoosh.i</a>
          </footer>
        </div>
      );
    }

    // Use ReactDOM.render for better compatibility with Google Apps Script
    if (ReactDOM.createRoot) {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } else {
      ReactDOM.render(<App />, document.getElementById('root'));
    }
  </script>
</body>

</html>

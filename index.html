          className={`lucide lucide-${name.toLowerCase()} ${className}`}\n          stroke=\"currentColor\"\n        >\n          {children.map(([childTag, childAttrs], i) => (\n            React.createElement(childTag, { ...childAttrs, key: i })\n          ))}\n        <\/svg>\n      );\n    };\n\n    // Extract Instagram post ID from URL\n    const extractInstagramPostId = (url) => {\n      if (!url || !url.includes('instagram.com')) return null;\n      const match = url.match(/instagram\\.com\\/p\\/([A-Za-z0-9_-]+)/) || url.match(/instagram\\.com\\/reel\\/([A-Za-z0-9_-]+)/);\n      return match ? match[1] : null;\n    };\n\n    // Get Instagram thumbnail URL\n    // WARNING: Instagram blocks direct media access via /media/?size=l endpoint\n    // This will often fail with 403 Forbidden errors. Graceful fallback is critical.\n    const getInstagramThumbnailUrl = (url) => {\n      const postId = extractInstagramPostId(url);\n      if (!postId) return null;\n      // NOTE: This URL pattern is BLOCKED by Instagram in most cases\n      // Frontend will display fallback message on error\n      return `https://www.instagram.com/p/${postId}/media/?size=l`;\n    };\n\n    // --- UTILS ---\n    const formatNumber = (num) => {\n      if (!num) return '0';\n      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';\n      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';\n      return Math.round(num).toString().replace(/\\B(?=(\\d{3})+(?!\\d))/g, \",\");\n    };\n\n    const calculateAbsolute = (reach, percentage) => Math.round((reach * percentage) / 100);\n\n    // Extract Instagram post ID from URL and create embed URL\n    const getInstagramEmbedUrl = (url) => {\n      if (!url || !url.includes('instagram.com')) return null;\n      // Match Instagram post URL patterns\n      const match = url.match(/instagram\\.com\\/p\\/([A-Za-z0-9_-]+)/) || url.match(/instagram\\.com\\/reel\\/([A-Za-z0-9_-]+)/);\n      if (match && match[1]) {\n        return `https://www.instagram.com/p/${match[1]}/embed/`;\n      }\n      return null;\n    };\n\n    const generateCSV = (data) => {\n      if (!data || !data.length) return '';\n      const headers = [\n        'Week ID', 'Label', 'Date Range',\n        'Reach', 'Engagement', 'Views', 'Profile Activity',\n        'Followers %', 'Non-Followers %',\n        'Stories %', 'Reels %', 'Feeds %',\n        'Winning Content Title', 'Winning Content Link',\n        'Losing Content Title', 'Losing Content Link'\n      ];\n      const rows = data.map(row => [\n        row.id, row.label, row.dateRange,\n        row.metrics.reach, row.metrics.engagement, row.metrics.views, row.metrics.profileActivity,\n        row.metrics.followersPct, row.metrics.nonFollowersPct,\n        row.metrics.storiesPct, row.metrics.reelsPct, row.metrics.feedsPct,\n        row.winningContent.title, row.winningContent.link,\n        row.losingContent.title, row.losingContent.link\n      ]);\n      return [headers.join(','), ...rows.map(r => r.map(c => `\"${c}\"`).join(','))].join('\\n');\n    };\n\n    // --- INITIAL MOCK DATA (Defined Globally BEFORE Usage) ---\n    const initialWeeklyData = [\n      // --- OCTOBER 2025 (All above target) ---\n      {\n        id: 'week-1-oct-2025',\n        startDate: '2025-10-01',\n        label: 'WEEK 1 OCT',\n        dateRange: 'Oct 01 - Oct 07',\n        metrics: { reach: 85000, engagement: 11000, views: 120000, profileActivity: 1800, followersPct: 18.5, nonFollowersPct: 81.5, storiesPct: 22, reelsPct: 55, feedsPct: 23 },\n        winningContent: { type: 'IGR', title: 'Tips Digital Marketing 2026', thumbnail: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Reels prediksi tren.\", why: \"Visual hook kuat.\", todo: \"Buat part 2.\" } },\n        losingContent: { type: 'IGS', title: 'Promo Flash Sale', thumbnail: 'https://images.unsplash.com/photo-1611162616475-46b635cb6868?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Story jualan hard selling.\", why: \"Terlalu banyak teks.\", todo: \"Gunakan visual lebih clean.\" } }\n      },\n      {\n        id: 'week-2-oct-2025',\n        startDate: '2025-10-08',\n        label: 'WEEK 2 OCT',\n        dateRange: 'Oct 08 - Oct 14',\n        metrics: { reach: 92000, engagement: 12500, views: 135000, profileActivity: 2000, followersPct: 19.0, nonFollowersPct: 81.0, storiesPct: 20, reelsPct: 60, feedsPct: 20 },\n        winningContent: { type: 'IGF', title: 'Infografis Carousel Strategy', thumbnail: 'https://images.unsplash.com/photo-1611262588024-d12430b98920?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Carousel 7 slide.\", why: \"Save-able content.\", todo: \"Repurpose jadi PDF.\" } },\n        losingContent: { type: 'LKDN', title: 'Corporate Update', thumbnail: 'https://images.unsplash.com/photo-1616469829581-73993eb86b02?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Teks panjang tanpa poin.\", why: \"Membosankan.\", todo: \"Persingkat caption.\" } }\n      },\n      {\n        id: 'week-3-oct-2025',\n        startDate: '2025-10-15',\n        label: 'WEEK 3 OCT',\n        dateRange: 'Oct 15 - Oct 21',\n        metrics: { reach: 98000, engagement: 13800, views: 145000, profileActivity: 2200, followersPct: 20.0, nonFollowersPct: 80.0, storiesPct: 18, reelsPct: 65, feedsPct: 17 },\n        winningContent: { type: 'TKTK', title: 'Day in Life CMO', thumbnail: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Vlog keseharian.\", why: \"Relatable.\", todo: \"Buat rutin.\" } },\n        losingContent: { type: 'IGF', title: 'Product Catalog', thumbnail: 'https://images.unsplash.com/photo-1526947425960-945c6e72858f?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Foto produk saja.\", why: \"Kurang konteks.\", todo: \"Tambah lifestyle shot.\" } }\n      },\n      {\n        id: 'week-4-oct-2025'         metrics: { reach: 65000, engagement: 9100, views: 92000, profileActivity: 1300, followersPct: 14.2, nonFollowersPct: 85.8, storiesPct: 24, reelsPct: 52, feedsPct: 24 },\n        winningContent: { type: 'IGF', title: 'Team Building', thumbnail: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Foto tim happy.\", why: \"Human touch.\", todo: \"More BTS.\" } },\n        losingContent: { type: 'LKDN', title: 'Job Vacancy', thumbnail: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Poster kaku.\", why: \"Kurang menarik.\", todo: \"Video recruitment.\" } }\n      },\n      {\n        id: 'week-3-nov-2025',\n        startDate: '2025-11-15',\n        label: 'WEEK 3 NOV',\n        dateRange: 'Nov 15 - Nov 21',\n        metrics: { reach: 70000, engagement: 9800, views: 100000, profileActivity: 1450, followersPct: 14.8, nonFollowersPct: 85.2, storiesPct: 23, reelsPct: 53, feedsPct: 24 },\n        winningContent: { type: 'IGS', title: 'Quiz Sticker', thumbnail: 'https://images.unsplash.com/photo-1606326608606-aa0b62935f2b?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Tebak produk.\", why: \"Engagement bait.\", todo: \"Giveaway kecil.\" } },\n        losingContent: { type: 'IGR', title: 'Talking Head 5 Min', thumbnail: 'https://images.unsplash.com/photo-1589386417686-0d34b5903d23?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Durasi terlalu lama.\", why: \"Drop rate tinggi.\", todo: \"Cut under 60s.\" } }\n      },\n      {\n        id: 'week-4-nov-2025',\n        startDate: '2025-11-22',\n        label: 'WEEK 4 NOV',\n        dateRange: 'Nov 22 - Nov 28',\n        metrics: { reach: 72000, engagement: 10080, views: 102000, profileActivity: 1500, followersPct: 14.9, nonFollowersPct: 85.1, storiesPct: 22, reelsPct: 55, feedsPct: 23 },\n        winningContent: { type: 'TKTK', title: ' i hadiah.\", why: \"Saveable & Shareable.\", todo: \"Link di bio.\" } },\n        losingContent: { type: 'IGS', title: 'Zoom Screenshot', thumbnail: 'https://images.unsplash.com/photo-1588196749597-9ff075ee6b5b?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"SS meeting buram.\", why: \"Low quality.\", todo: \"Foto proper.\" } }\n      },\n      {\n        id: 'week-3-dec-2025',\n        startDate: '2025-12-15',\n        label: 'WEEK 3 DEC',\n        dateRange: 'Dec 15 - Dec 21',\n        metrics: { reach: 35000, engagement: 2800, views: 48000, profileActivity: 450, followersPct: 7.0, nonFollowersPct: 93.0, storiesPct: 38, reelsPct: 28, feedsPct: 34 },\n        winningContent: { type: 'IGS', title: 'Holiday Countdown', thumbnail: 'https://images.unsplash.com/photo-1576919228236-a097c32a5cd4?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Hitung mundur libur.\", why: \"Excitement.\", todo: \"Set reminder.\" } },\n        losingContent: { type: 'TKTK', title: 'Sales Pitch', thumbnail: 'https://images.unsplash.com/photo-1556744246-23b5d66060d4?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Jualan langsung.\", why: \"Hard selling.\", todo: \"Soft selling.\" } }\n      },\n      {\n        id: 'week-4-dec-2025',\n        startDate: '2025-12-22',\n        label: 'WEEK 4 DEC',\n        dateRange: 'Dec 22 - Dec 28',\n        metrics: { reach: 32000, engagement: 2560, views: 44000, profileActivity: 400, followersPct: 6.5, nonFollowersPct: 93.5, storiesPct: 40, reelsPct: 25, feedsPct: 35 },\n        winningContent: { type: 'IGR', title: 'Holiday Greetings', thumbnail: 'https://images.unsplash.com/photo-1482517967863-00e15c9b44be?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Ucapan liburan.\", why: \"Seasonal.\", todo: \"Plan untuk tahun depan.\" } },\n        losingContent: { type: 'IGF', title: 'Year End Sale', thumbnail: 'https://images.unsplash.com/photo-1607082349566-187342175e2f?auto=format&fit=crop&w=600&q=80', link: '#', analysis: { what: \"Promo terlalu sering.\", why: \"Audience fatigue.\", todo: \"Kurangi frekuensi.\" } }\n      }\n    ];\n\n    // --- COMPONENTS ---\n\n    const InfoTooltip = ({ text, isDark }) => (\n      <div className=\"group relative inline-block ml-2 cursor-help align-middle\">\n        <span className={`text-base ${isDark ? 'text-teal-400 hover:text-orange-400' : 'text-slate-400 hover:text-blue-500'}`}>ℹ️<\/span>\n        <div className={`invisible group-hover:visible absolute z-50 w-72 max-w-[90vw] p-3 mt-1 -left-32 text-xs rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none border leading-relaxed break-words ${isDark ? 'bg-slate-800 text-slate-200 border-slate-600' : 'bg-white text-slate-700 border-slate-200'}`} style={{ fontFamily: 'system-ui, -apple-system, sans-serif', wordWrap: 'break-word', overflowWrap: 'break-word' }}>\n          {text}\n        <\/div>\n      <\/div>\n    );\n\n    const MetricCard = ({ title, value, subValue, iconName, color, isDark, emoji }) => {\n      const getThemeColors = () => {\n        if (isDark) {\n          if (color === 'orange') return 'text-orange-400 bg-orange-900/20';\n          if (color === 'purple') return 'text-purple-400 bg-purple-900/20';\n          if (color === 'green') return 'text-teal-400 bg-teal-900/20';\n          return 'text-blue-400 bg-blue-900/20';\n        }\n        return `text-${color}-600 bg-${color}-50`;\n      }\n\n      return (\n        <div className={`p-5 rounded-xl border transition-all duration-300 ${isDark\n          ? 'bg-slate-800 border-slate-700 hover:border-teal-500/50 shadow-lg'\n          : 'bg-white border-slate-100 shadow-sm hover:shadow-md'\n          }`}>\n          <div className=\"flex justify-between items-start mb-4\">\n            <div>\n              <p className={`text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{title}<\/p>\n              <h3 className={`text-2xl font-bold mt-1 ${isDark ? 'text-slate-100' : 'text-slate-800'}`}>{value}<\/h3>\n            <\/div>\n            <div className={`p-2 rounded-lg ${getThemeColors()}`}>\n              <span className=\"text-xl\">{emoji}<\/span>\n            <\/div>\n          <\/div>\n          <p className={`text-xs ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>{subValue}<\/p>\n        <\/div>\n      );\n    };\n\n    const ContentCard = ({ item, isDark, type, periodLabel }) => {\n      if (!item) return null;\n      const content = type === 'winning' ? item.winningContent : item.losingContent;\n      if (!content) return null;\n\n      const isWinning = type === 'winning';\n      const badgeColor = isWinning\n        ? (isDark ? 'bg-orange-500/20 text-orange-300 border border-orange-500/30' : 'bg-yellow-100 text-yellow-700')\n        : (isDark ? 'bg-red-500/20 text-red-300 border border-red-500/30' : 'bg-red-100 text-red-700');\n\n      const iconLabel = isWinning ? \"👑 Best\" : \"📉 Needs Improvement\";\n      const label = periodLabel || item.label;\n      // Helper to fallback to robust thumbnail logic for display\n      // If we have a saved thumbnail (from backend), use it.\n      // If not, falls back to determining it from the link (only for display)\n      const displayThumbnail = content.thumbnail || getInstagramThumbnailUrl(content.link);\n      const [imageError, setImageError] = useState(false);\n\n      return (\n        <div className={`block rounded-xl border overflow-hidden flex flex-col transition-all hover:shadow-lg ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>\n          <div className=\"relative w-full bg-slate-200 overflow-hidden\" style={{ height: '500px', minHeight: '500px' }}>\n            {displayThumbnail && !imageError ? (\n              <img\n                src={displayThumbnail}\n                alt={content.title || 'Instagram Post'}\n                className=\"w-full h-full object-cover\"\n                style={{ width: '100%', height: '500px', objectFit: 'cover' }}\n                onError={() => setImageError(true)}\n                onLoad={(e) => {\n                  // Ensure image covers full container\n                  e.target.style.objectFit = 'cover';\n                  e.target.style.width = '100%';\n                  e.target.style.height = '100%';\n                }}\n              />\n            ) : (\n              <div className=\"w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-slate-200 to-slate-300 dark:from-slate-700 dark:to-slate-800\" style={{ height: '500px', minHeight: '500px' }}>\n                <span className=\"text-6xl mb-4\">📷<\/span>\n                <span className={`text-sm text-center px-4 font-medium ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>\n                  {imageError ? '⚠️ Instagram Preview Unavailable' : '📸 No Preview Link Provided'}\n                <\/span>\n                <span className={`text-xs text-center px-4 mt-2 ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>\n                  {imageError ? 'Instagram blocks direct media access' : 'Add content link to see preview'}\n                <\/span>\n              <\/div>\n            )}\n            <div className=\"absolute top-3 left-3 z-10\">\n              <span className={`px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider backdrop-blur-sm shadow-sm ${badgeColor}`}>\n                {iconLabel} of {label}\n              <\/span>\n            <\/div>\n            {content.link && (\n              <a href={content.link} target=\"_blank\" rel=\"noreferrer\" className=\"absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity duration-300 z-20\">\n                <span className=\"text-white font-bold flex items-center gap-2 border border-white/50 px-4 py-2 rounded-full backdrop-blur-md\">\n                  🔗 View Content\n                <\/span>\n              <\/a>\n            )}\n          <\/div>\n          <div className=\"p-5 flex flex-col flex-1\">\n            <div className=\"flex items-center gap-2 mb-3\">\n              <span className={`text-[10px] font-bold px-2 py-1 rounded-md border ${isDark ? 'bg-slate-700 text-teal-400 border-slate-600' : 'bg-slate-100 text-slate-800 border-slate-200'}`}>\n                {content.type}\n              <\/span>\n            <\/div>\n            <h4 className={`font-bold text-base mb-4 leading-tight ${isDark ? 'text-white' : 'text-slate-900'}`}>\n              {content.title}\n            <\/h4>\n\n            <div className={`mt-auto p-4 rounded-xl text-xs space-y-3 border ${isDark ? 'bg-slate-900/50 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>\n              <div className=\"grid grid-cols-[50px_1fr] gap-2\">\n                <span className=\"font-bold text-blue-500 uppercase\">WHAT<\/span>\n                <span className={`leading-relaxed ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{content.analysis.what}<\/span>\n              <\/div>\n              <div className=\"grid grid-cols-[50px_1fr] gap-2\">\n                <span className=\"font-bold text-orange-500 uppercase\">WHY<\/span>\n                <span className={`leading-relaxed ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{content.analysis.why}<\/span>\n              <\/div>\n              <div className=\"grid grid-cols-[50px_1fr] gap-2\">\n                <span className=\"font-bold text-teal-500 uppercase\">TODO<\/span>\n                <span className={`leading-relaxed ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>{content.analysis.todo}<\/span>\n              <\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n      );\n    }\n\n    const GoalWidget = ({ label, current, target, targetMonth, isDark }) => {\n      return (\n        <div className={`mb-4 ${isDark ? 'text-slate-300' : 'text-slate-700'}`}>\n          <div className=\"flex justify-between text-xs font-bold mb-1\">\n            <span>{label}<\/span>\n            <span className={isDark ? 'text-teal-400' : 'text-blue-600'}>Target ({targetMonth}): {target}%<\/span>\n          <\/div>\n          <div className={`h-3 rounded-full overflow-hidden ${isDark ? 'bg-slate-700' : 'bg-slate-200'}`}>\n            <div\n              style={{ width: `${Math.min((current / target) * 100, 100)}%` }}\n              className={`h-full rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-blue-500 to-indigo-500`}\n            ><\/div>\n          <\/div>\n          <div className=\"text-[10px] text-right mt-1 opacity-70\">\n            Current: {current}%\n          <\/div>\n        <\/div>\n      );\n    }\n\n    const MonthlyTargetsWidget = ({ monthlyTargets, selectedMonth, onMonthChange, metrics, isDark, allData }) => {\n      const monthOptions = [];\n      for (let year = 2025; year <= 2026; year++) {\n        const startMonth = year === 2025 ? 9 : 0; // Oct 2025 = month 9, Jan 2026 = month 0\n        const endMonth = year === 2026 ? 11 : 11; // Dec = month 11\n        for (let month = startMonth; month <= endMonth; month++) {\n          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n          monthOptions.push(`${monthNames[month]} ${year}`);\n        }\n      }\n\n      const currentTargets = monthlyTargets[selectedMonth] || { reachPct: 15, engagementPct: 12 };\n\n      // Calculate monthly metrics for selected month\n      const monthlyMetrics = useMemo(() => {\n        if (!allData || allData.length === 0) return { avgFollowersPct: 0, er: 0 };\n        const [monthName, yearStr] = selectedMonth.split(' ');\n        const year = parseInt(yearStr);\n        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n        const monthIndex = monthNames.indexOf(monthName);\n\n        const monthData = allData.filter(week => {\n          const weekDate = new Date(week.startDate);\n          return weekDate.getMonth() === monthIndex && weekDate.getFullYear() === year;\n        });\n\n        if (monthData.length === 0) return { avgFollowersPct: 0, er: 0 };\n\n        const totalReach = monthData.reduce((sum, w) => sum + w.metrics.reach, 0);\n        const totalEngagement = monthData.reduce((sum, w) => sum + w.metrics.engagement, 0);\n        const weightedFollowers = monthData.reduce((sum, w) => sum + (w.metrics.reach * w.metrics.followersPct), 0);\n        const avgFollowersPct = totalReach > 0 ? (weightedFollowers / totalReach) : 0;\n        const er = totalReach > 0 ? (totalEngagement / totalReach) * 100 : 0;\n\n        return { avgFollowersPct: avgFollowersPct.toFixed(2), er: er.toFixed(2) };\n      }, [allData, selectedMonth]);\n\n      return (\n        <div className={`p-6 rounded-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>\n          <div className=\"flex items-center gap-2 mb-4\">\n            <h3 className={`text-sm font-bold uppercase tracking-wider ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>\n              🎯 Monthly Targets\n            <\/h3>\n            <InfoTooltip text=\"Select a month to view its target progress. Targets are set in the Admin Settings.\" isDark={isDark} />\n          <\/div>\n          <div className=\"mb-4\">\n            <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>Select Month<\/label>\n            <select\n              value={selectedMonth}\n              onChange={(e) => onMonthChange(e.target.value)}\n              className={`w-full p-2 rounded-lg text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`}\n            >\n              {monthOptions.map(m =>\n                <option key={m} value={m}>{m}<\/option>\n              )}\n            <\/select>\n          <\/div>\n          <GoalWidget label=\"Reach Goal\" current={parseFloat(monthlyMetrics.avgFollowersPct)} target={currentTargets.reachPct} targetMonth={selectedMonth} isDark={isDark} />\n          <GoalWidget label=\"Engagement Rate Goal\" current={parseFloat(monthlyMetrics.er)} target={currentTargets.engagementPct} targetMonth={selectedMonth} isDark={isDark} />\n        <\/div>\n      );\n    }\n\n    const ComparisonModal = ({ isOpen, onClose, data, isDark }) => {\n      const [mode, setMode] = useState('weeks');\n      const [idA, setIdA] = useState('');\n      const [idB, setIdB] = useState('');\n      const [idC, setIdC] = useState('');\n\n      const monthlyData = useMemo(() => {\n        const months = {};\n        data.forEach(d => {\n          const m = new Date(d.startDate).toLocaleString('en-US', { month: 'short', year: 'numeric' });\n          if (!months[m]) months[m] = { label: m, metrics: { reach: 0, engagement: 0, views: 0, profileActivity: 0, count: 0, followersPct: 0 } };\n          months[m].metrics.reach += d.metrics.reach;\n          months[m].metrics.engagement += d.metrics.engagement;\n          months[m].metrics.views += d.metrics.views;\n          months[m].metrics.profileActivity += d.metrics.profileActivity;\n          months[m].metrics.count++;\n        });\n        return Object.values(months).map((m, idx) => ({ id: `month-${idx}`, ...m }));\n      }, [data]);\n\n      const sourceData = mode === 'weeks' ? data : monthlyData;\n\n      useEffect(() => {\n        if (sourceData.length > 0) {\n          setIdA(sourceData[0].id);\n          if (sourceData.length > 1) setIdB(sourceData[1].id);\n          if (sourceData.length > 2) setIdC(sourceData[2].id);\n        }\n      }, [sourceData, mode]);\n\n      if (!isOpen) return null;\n\n      const itemA = sourceData.find(d => d.id === idA) || sourceData[0];\n      const itemB = sourceData.find(d => d.id === idB) || (sourceData.length > 1 ? sourceData[1] : null);\n      const itemC = sourceData.find(d => d.id === idC) || (sourceData.length > 2 ? sourceData[2] : null);\n\n      const calcDiff = (valA, valB) => {\n        if (!valA || !valB) return { diff: 0, pct: 0 };\n        const diff = valB - valA;\n        const pct = valA === 0 ? 0 : ((diff / valA) * 100).toFixed(1);\n        return { diff, pct };\n      }\n\n      const renderRow = (label, valA, valB, valC, format = true) => {\n        const diffAB = valB ? calcDiff(valA, valB) : { diff: 0, pct: 0 };\n        const diffAC = valC ? calcDiff(valA, valC) : { diff: 0, pct: 0 };\n        const isPositiveAB = diffAB.diff >= 0;\n        const isPositiveAC = diffAC.diff >= 0;\n        return (\n          <tr className={`border-b ${isDark ? 'border-slate-700' : 'border-slate-100'}`}>\n            <td className={`p-3 text-sm font-medium ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>{label}<\/td>\n            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{format ? formatNumber(valA) : valA}<\/td>\n            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{valB ? (format ? formatNumber(valB) : valB) : '-'}<\/td>\n            <td className={`p-3 text-sm font-bold text-right ${isDark ? 'text-white' : 'text-slate-900'}`}>{valC ? (format ? formatNumber(valC) : valC) : '-'}<\/td>\n            <td className={`p-3 text-sm font-bold text-right ${isPositiveAB ? 'text-green-500' : 'text-red-500'}`}>\n              {valB ? `${isPositiveAB ? '+' : ''}${format ? formatNumber(diffAB.diff) : diffAB.diff} (${isPositiveAB ? '+' : ''}${diffAB.pct}%)` : '-'}\n            <\/td>\n            <td className={`p-3 text-sm font-bold text-right ${isPositiveAC ? 'text-green-500' : 'text-red-500'}`}>\n              {valC ? `${isPositiveAC ? '+' : ''}${format ? formatNumber(diffAC.diff) : diffAC.diff} (${isPositiveAC ? '+' : ''}${diffAC.pct}%)` : '-'}\n            <\/td>\n          <\/tr>\n        )\n      }\n\n      return (\n        <div className=\"fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4\">\n          <div className={`w-full max-w-5xl p-6 rounded-3xl shadow-2xl border flex flex-col max-h-[90vh] ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>\n            <div className=\"flex justify-between items-center mb-6\">\n              <h3 className={`text-xl font-bold flex items-center gap-2 ${isDark ? 'text-white' : 'text-slate-900'}`}>\n                🔄 Comparison\n              <\/h3>\n              <div className={`flex rounded-lg p-1 ${isDark ? 'bg-slate-900' : 'bg-slate-100'}`}>\n                <button onClick={() => setMode('weeks')} className={`px-3 py-1 text-xs font-bold rounded ${mode === 'weeks' ? (isDark ? 'bg-teal-600 text-white' : 'bg-white shadow') : 'text-slate-500'}`}>Weeks<\/button>\n                <button onClick={() => setMode('months')} className={`px-3 py-1 text-xs font-bold rounded ${mode === 'months' ? (isDark ? 'bg-teal-600 text-white' : 'bg-white shadow') : 'text-slate-500'}`}>Months<\/button>\n              <\/div>\n              <button onClick={onClose} className={`p-2 rounded-full hover:bg-slate-500/20 ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>✕<\/button>\n            <\/div>\n            <div className=\"grid grid-cols-3 gap-4 mb-6\">\n              <div><select value={idA} onChange={e => setIdA(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}<\/option>)}<\/select><\/div>\n              <div><select value={idB} onChange={e => setIdB(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}<\/option>)}<\/select><\/div>\n              <div><select value={idC} onChange={e => setIdC(e.target.value)} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`}>{sourceData.map(d => <option key={d.id} value={d.id}>{d.label}<\/option>)}<\/select><\/div>\n            <\/div>\n            <div className={`rounded-xl overflow-hidden overflow-y-auto flex-1 border ${isDark ? 'border-slate-700 bg-slate-900/50' : 'border-slate-200 bg-slate-50'}`}>\n              <table className=\"w-full text-left\">\n                <thead className={isDark ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-500'}>\n                  <tr>\n                    <th className=\"p-3 text-xs uppercase\">Metric<\/th>\n                    <th className=\"p-3 text-right text-xs uppercase\">{itemA?.label}<\/th>\n                    <th className=\"p-3 text-right text-xs uppercase\">{itemB?.label || '-'}<\/th>\n                    <th className=\"p-3 text-right text-xs uppercase\">{itemC?.label || '-'}<\/th>\n                    <th className=\"p-3 text-right text-xs uppercase\">Delta A→B<\/th>\n                    <th className=\"p-3 text-right text-xs uppercase\">Delta A→C<\/th>\n                  <\/tr>\n                <\/thead>\n                <tbody>\n                  {itemA && (<>\n                    {renderRow(\"Total Reach\", itemA.metrics.reach, itemB?.metrics.reach, itemC?.metrics.reach)}\n                    {renderRow(\"Engagement\", itemA.metrics.engagement, itemB?.metrics.engagement, itemC?.metrics.engagement)}\n                    {renderRow(\"Views\", itemA.metrics.views, itemB?.metrics.views, itemC?.metrics.views)}\n                    {renderRow(\"Profile Activity\", itemA.metrics.profileActivity, itemB?.metrics.profileActivity, itemC?.metrics.profileActivity)}\n                  <\/>)}\n                <\/tbody>\n              <\/table>\n            <\/div>\n          <\/div>\n        <\/div>\n      )\n    };\n\n    const ExportModal = ({ isOpen, onClose, isDark, allData, currentTimeRange, onTimeRangeChange }) => {\n      const [exportTimeRange, setExportTimeRange] = useState(currentTimeRange);\n\n      if (!isOpen) return null;\n\n      const filterDataByRange = (data, range) => {\n        const today = new Date('2025-12-31');\n        return data.filter(item => {\n          const itemDate = new Date(item.startDate);\n          const diffDays = Math.ceil(Math.abs(today - itemDate) / (1000 * 60 * 60 * 24));\n          switch (range) {\n            case 'last_week': return diffDays <= 7;\n            case 'current_month': return itemDate.getMonth() === today.getMonth() && itemDate.getFullYear() === today.getFullYear();\n            case 'last_30_days': return diffDays <= 30;\n            case 'prev_month': return itemDate.getMonth() === today.getMonth() - 1;\n            case 'last_3_months': return diffDays <= 90;\n            case 'last_6_months': return diffDays <= 180;\n            case 'last_9_months': return diffDays <= 270;\n            case 'last_1_year': return diffDays <= 365;\n            default: return true;\n          }\n        });\n      };\n\n      const handlePDFDownload = () => {\n        if (typeof google !== 'undefined' && google.script) {\n          const btn = document.getElementById('pdf-btn');\n          if (btn) btn.innerText = \"Generating PDF...\";\n\n          google.script.run\n            .withSuccessHandler((url) => {\n              window.open(url, '_blank');\n              onClose();\n            })\n            .withFailureHandler((e) => {\n              alert(\"Error creating PDF: \" + e);\n              onClose();\n            })\n            .createPdfReport();\n        } else {\n          alert(\"PDF Download only works inside Google Apps Script deployment.\");\n          onClose();\n        }\n      };\n\n      const handleCSVDownload = () => {\n        const filteredData = filterDataByRange(allData, exportTimeRange);\n        const csvData = generateCSV(filteredData);\n        const blob = new Blob([csvData], { type: 'text/csv' });\n        const url = window.URL.createObjectURL(blob);\n        const a = document.createElement('a');\n        a.href = url;\n        a.download = `JOY_Report_${exportTimeRange.replace(/_/g, '_')}.csv`;\n        a.click();\n        window.URL.revokeObjectURL(url);\n        onClose();\n      };\n\n      const getRangeLabel = (range) => {\n        const labels = {\n          'last_week': 'Last Week',\n          'current_month': 'Current Month',\n          'prev_month': 'Previous Month',\n          'last_30_days': 'Last 30 Days',\n          'last_3_months': 'Last 3 Months',\n          'last_6_months': 'Last 6 Months',\n          'last_9_months': 'Last 9 Months',\n          'last_1_year': 'Last 1 Year'\n        };\n        return labels[range] || range;\n      };\n\n      return (\n        <div className=\"fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4\">\n          <div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>\n            <div className=\"flex items-center gap-3 mb-6\">\n              <div className={`p-3 rounded-full ${isDark ? 'bg-red-500/20 text-red-400' : 'bg-red-100 text-red-600'}`}><span className=\"text-2xl\">⬇️<\/span><\/div>\n              <div><h3 className={`text-xl font-bold ${isDark ? 'text-white' : 'text-slate-900'}`}>Export Options<\/h3><\/div>\n            <\/div>\n            <div className={`p-4 rounded-xl mb-6 border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>\n              <label className={`block text-xs font-bold uppercase tracking-wider mb-2 ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Select Time Range<\/label>\n              <select\n                value={exportTimeRange}\n                onChange={(e) => setExportTimeRange(e.target.value)}\n                className={`w-full p-3 rounded-lg text-sm border outline-none ${isDark ? 'bg-slate-800 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`}\n              >\n                <option value=\"last_week\">Last Week<\/option>\n                <option value=\"current_month\">Current Month<\/option>\n                <option value=\"prev_month\">Previous Month<\/option>\n                <option value=\"last_30_days\">Last 30 Days<\/option>\n                <option value=\"last_3_months\">Last 3 Months<\/option>\n                <option value=\"last_6_months\">Last 6 Months<\/option>\n                <option value=\"last_9_months\">Last 9 Months<\/option>\n                <option value=\"last_1_year\">Last 1 Year<\/option>\n              <\/select>\n              <div className=\"mt-2 text-xs text-slate-500\">Selected: {getRangeLabel(exportTimeRange)}<\/div>\n            <\/div>\n            <div className=\"space-y-3\">\n              <button id=\"pdf-btn\" onClick={handlePDFDownload} className=\"w-full py-3 text-sm font-bold rounded-xl bg-gradient-to-r from-red-500 to-red-600 text-white hover:from-red-600 hover:to-red-700 shadow-lg shadow-red-500/30 flex items-center justify-center gap-2\">📥 Download Database PDF (Raw Spreadsheet)<\/button>\n              <button onClick={handleCSVDownload} className={`w-full py-3 text-sm font-bold rounded-xl border flex items-center justify-center gap-2 ${isDark ? 'border-slate-600 text-slate-300 hover:bg-slate-700' : 'border-slate-200 text-slate-700 hover:bg-slate-50'}`}>📄 Download CSV (Raw Data)<\/button>\n              <button onClick={onClose} className={`w-full py-3 text-sm font-bold rounded-xl ${isDark ? 'text-slate-500 hover:text-slate-300' : 'text-slate-400 hover:text-slate-600'}`}>Cancel<\/button>\n            <\/div>\n          <\/div>\n        <\/div>\n      )\n    };\n\n    // --- GROWTH TRACKING COMPONENT ---\n    const getMonthAbbreviation = (monthName) => {\n      const monthMap = {\n        'January': 'JAN', 'February': 'FEB', 'March': 'MAR', 'April': 'APR',\n        'May': 'MAY', 'June': 'JUN', 'July': 'JUL', 'August': 'AUG',\n        'September': 'SEP', 'October': 'OCT', 'November': 'NOV', 'December': 'DEC'\n      };\n      return monthMap[monthName] || monthName.substring(0, 3).toUpperCase();\n    };\n\n    const formatMonthForDisplay = (monthStr) => {\n      // Convert \"October 2025\" to \"October 2025\" format (already correct)\n      // But handle if it comes as a Date object\n      if (monthStr instanceof Date) {\n        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n        return `${monthNames[monthStr.getMonth()]} ${monthStr.getFullYear()}`;\n      }\n      return monthStr;\n    };\n\n    const getMonthAbbrevWithYear = (monthStr) => {\n      // Convert \"October 2025\" to \"OCT-25\"\n      const parts = monthStr.split(' ');\n      if (parts.length === 2) {\n        const monthName = parts[0];\n        const year = parts[1];\n        const abbrev = getMonthAbbreviation(monthName);\n        const yearShort = year.length === 4 ? year.substring(2) : year;\n        return `${abbrev}-${yearShort}`;\n      }\n      // If it's a Date object\n      if (monthStr instanceof Date) {\n        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n        const monthName = monthNames[monthStr.getMonth()];\n        const year = monthStr.getFullYear().toString();\n        const abbrev = getMonthAbbreviation(monthName);\n        return `${abbrev}-${year.substring(2)}`;\n      }\n      return monthStr;\n    };\n\n    const GrowthTracking = ({ isDark, onBack }) => {\n      const [growthData, setGrowthData] = useState([\n        { month: 'October 2025', instagram: 12500, tiktok: 3200, linkedin: 1800, posts: 45, totalFollowers: 17500 },\n        { month: 'November 2025', instagram: 13200, tik formattedMonth = newMonth.trim();\n        // Convert date strings to \"Month Year\" format if needed\n        if (formattedMonth.includes('GMT') || formattedMonth.includes('T00:00:00') || formattedMonth.includes('Wed') || formattedMonth.includes('Sat') || formattedMonth.includes('Mon') || formattedMonth.includes('Thu')) {\n          try {\n            const date = new Date(formattedMonth);\n            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n            formattedMonth = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;\n          } catch (e) {\n            // Keep original if parsing fails\n          }\n        }\n        setForm({ month: formattedMonth, instagram: 0, tiktok: 0, linkedin: 0, posts: 0, totalFollowers: 0 });\n        setEditing('new');\n      };\n\n      const handleEdit = (item) => {\n        // Normalize month format\n        let month = item.month;\n        if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {\n          try {\n            const date = new Date(month);\n            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n            month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;\n          } catch (e) {\n            // Keep original if parsing fails\n          }\n        }\n        setForm({ ...item, month: month, posts: item.posts || 0 });\n        setEditing(month);\n      };\n\n      const sortGrowthData = (data) => {\n        return [...data].sort((a, b) => {\n          const dateA = new Date(a.month);\n          const dateB = new Date(b.month);\n          return dateA - dateB;\n        });\n      };\n\n      const handleSave = () => {\n        // Normalize month format before saving\n        let normalizedForm = { ...form };\n        if (normalizedForm.month.includes('GMT') || normalizedForm.month.includes('T00:00:00') || normalizedForm.month.includes('Wed') || normalizedForm.month.includes('Sat') || normalizedForm.month.includes('Mon') || normalizedForm.month.includes('Thu')) {\n          try {\n            const date = new Date(normalizedForm.month);\n            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n            normalizedForm.month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;\n          } catch (e) {\n            // Keep original if parsing fails\n          }\n        }\n\n        let newData;\n        if (editing === 'new') {\n          newData = sortGrowthData([...growthData, normalizedForm]);\n          setGrowthData(newData);\n        } else {\n          newData = growthData.map(m => {\n            // Normalize existing months too\n            let month = m.month;\n            if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {\n              try {\n                const date = new Date(month);\n                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n                month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;\n              } catch (e) { }\n            }\n            return month === editing ? normalizedForm : { ...m, month: month };\n          });\n          setGrowthData(sortGrowthData(newData));\n        }\n\n        if (typeof google !== 'undefined' && google.script) {\n          google.script.run\n            .withSuccessHandler(() => {\n              alert(\"Growth data saved!\");\n              // Reload data from server to ensure sync\n              google.script.run\n                .withSuccessHandler((data) => {\n                  if (data && data.length > 0) {\n                    const normalizedData = data.map(item => {\n                      let month = item.month;\n                      if (month.includes('GMT') || month.includes('T00:00:00') || month.includes('Wed') || month.includes('Sat') || month.includes('Mon') || month.includes('Thu')) {\n                        try {\n                          const date = new Date(month);\n                          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n                          month = `${monthNames[date.getMonth()]} ${date.getFullYear()}`;\n                        } catch (e) { }\n                      }\n                      return { ...item, month: month, posts: item.posts || 0 };\n                    });\n                    setGrowthData(normalizedData);\n                  }\n                })\n                .getGrowthData();\n            })\n            .withFailureHandler((e) => alert(\"Failed to save: \" + e))\n            .saveGrowthData(newData);\n        }\n        setEditing(null);\n      };\n\n      const handleDelete = (month) => {\n        if (!confirm(`Delete ${month}?`)) return;\n        const newData = growthData.filter(m => m.month !== month);\n        setGrowthData(newData);\n        if (typeof google !== 'undefined' && google.script) {\n          google.script.run.saveGrowthData(newData);\n        }\n      };\n\n      return (\n        <div className=\"space-y-6\">\n          <div className=\"flex justify-between items-center mb-6\">\n            <div>\n              <h2 className={`text-2xl font-bold flex items-center gap-2 ${isDark ? 'text-white' : 'text-slate-900'}`}>📊 Growth Tracking<\/h2>\n              <p className={`text-sm ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>Job On Yours Followers Growth Monitor<\/p>\n            <\/div>\n            <div className=\"flex gap-2\">\n              <button onClick={handleAdd} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 ${isDark ? 'bg-cyan-600 text-white hover:bg-cyan-700' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>➕ Add<\/button>\n              <button onClick={onBack} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 border ${isDark ? 'bg-slate-800 text-cyan-400 border-cyan-900 hover:bg-slate-700' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>← Back<\/button>\n            <\/div>\n          <\/div>\n\n          <div className={`p-6 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-xl'}`}>\n            <h3 className={`text-lg font-bold mb-6 ${isDark ? 'text-white' : 'text-slate-900'}`}>Followers Growth Trend<\/h3>\n            <ResponsiveContainer width=\"100%\" height={300}>\n              <LineChart data={growthData.map(d => ({ ...d, monthLabel: getMonthAbbrevWithYear(d.month) }))}>\n                <CartesianGrid strokeDasharray=\"3 3\" stroke={isDark ? '#334155' : '#e2e8f0'} />\n                <XAxis dataKey=\"monthLabel\" stroke={isDark ? '#94a3b8' : '#64748b'} />\n                <YAxis stroke={isDark ? '#94a3b8' : '#64748b'} />\n                <Tooltip contentStyle={{ backgroundColor: isDark ? '#1e293b' : '#fff', border: 'none', borderRadius: '8px' }} />\n                <Legend />\n                <Line type=\"monotone\" dataKey=\"instagram\" stroke=\"#E1306C\" strokeWidth={2} name=\"Instagram\" />\n                <Line type=\"monotone\" dataKey=\"tiktok\" stroke=\"#00F2EA\" strokeWidth={2} name=\"TikTok\" />\n                <Line type=\"monotone\" dataKey=\"linkedin\" stroke=\"#0077B5\" strokeWidth={2} name=\"LinkedIn\" />\n              <\/LineChart>\n            <\/ResponsiveContainer>\n          <\/div>\n          <div className={`p-6 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-xl'}`}>\n            <h3 className={`text-lg font-bold mb-6 ${isDark ? 'text-white' : 'text-slate-900'}`}>Posts Growth Trend<\/h3>\n            <ResponsiveContainer width=\"100%\" height={300}>\n              <LineChart data={growthData.map(d => ({ ...d, monthLabel: getMonthAbbrevWithYear(d.month) }))}>\n                <CartesianGrid strokeDasharray=\"3 3\" stroke={isDark ? '#334155' : '#e2e8f0'} />\n                <XAxis dataKey=\"monthLabel\" stroke={isDark ? '#94a3b8' : '#64748b'} />\n                <YAxis stroke={isDark ? '#94a3b8' : '#64748b'} />\n                <Tooltip contentStyle={{ backgroundColor: isDark ? '#1e293b' : '#fff', border: 'none', borderRadius: '8px' }} />\n                <Legend />\n                <Line type=\"monotone\" dataKey=\"posts\" stroke=\"#10b981\" strokeWidth={2} name=\"Posts\" />\n              <\/LineChart>\n            <\/ResponsiveContainer>\n          <\/div>\n\n          {editing ? (\n            <div className={`p-8 rounded-3xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200 shadow-xl'}`}>\n              <h3 className={`text-xl font-bold mb-6 ${isDark ? 'text-cyan-400' : 'text-blue-600'}`}>Editing: {editing === 'new' ? 'New Month' : form.month}<\/h3>\n              {editing === 'new' && (\n                <div className=\"mb-4\">\n                  <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-300' : 'text-slate-600'}`}>Month<\/label>\n                  <input type=\"text\" value={form.month} onChange={e => setForm({ ...form, month: e.target.value })} placeholder=\"January 2026\" className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`} />\n                <\/div>\n              )}\n              <div className=\"grid grid-cols-1 md:grid-cols-4 gap-6 mb-6\">\n                <div>\n                  <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-pink-400' : 'text-pink-600'}`}>Instagram<\/         <\/div>\n              <div className={`p-4 rounded-xl mb-6 border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>\n                <span className=\"text-xs font-bold text-slate-500\">Total (Auto): <\/span>\n                <span className={`text-2xl font-bold ml-3 ${isDark ? 'text-cyan-400' : 'text-blue-600'}`}>{formatNumber(form.totalFollowers)}<\/span>\n              <\/div>\n              <div className=\"flex justify-end gap-3\">\n                <button onClick={() => setEditing(null)} className=\"px-8 py-3 rounded-xl text-sm font-bold bg-slate-500/10 hover:bg-slate-500/20\">Cancel<\/button>\n                <button onClick={handleSave} className=\"px-8 py-3 rounded-xl text-sm font-bold bg-cyan-500 text-white hover:bg-cyan-600 shadow-lg flex items-center gap-2 transform hover:scale-105\">💾 Save<\/button>\n              <\/div>\n            <\/div>\n          ) : (\n            <div className=\"space-y-4\">\n              {growthData.map(m => (\n                <div key={m.month} className={`p-5 rounded-2xl border flex justify-between items-center transition hover:shadow-lg ${isDark ? 'bg-slate-800 border-slate-700 hover:border-cyan-500/30' : 'bg-white border-slate-200 hover:border-blue-300'}`}>\n                  <div className=\"flex items-center gap-4\">\n                    <div className={`w-16 h-16 rounded-xl flex items-center justify-center font-bold text-sm ${isDark ? 'bg-slate-900 text-slate-500' : 'bg-slate-100 text-slate-400'}`}>{getMonthAbbrevWithYear(m.month)}<\/div>\n                    <div>\n                      <h3 className={`font-bold ${isDark ? 'text-white' : 'text-slate-900'}`}>{formatMonthForDisplay(m.month)}<\/h3>\n                      <p className=\"text-xs text-slate-500\">Total: {formatNumber(m.totalFollowers)}<\/p>\n                    <\/div>\n                  <\/div>\n                  <div className=\"hidden md:flex gap-6 text-sm\">\n                    <div className=\"text-center\">\n                      <div className=\"text-xs text-slate-500\">IG<\/div>\n                      <div className=\"font-bold text-pink-500\">{formatNumber(m.instagram)}<\/div>\n                    <\/div>\n                    <div className=\"text-center\">\n                      <div className=\"text-xs text-slate-500\">TT<\/div>\n                      <div className=\"font-bold text-cyan-400\">{formatNumber(m.tiktok)}<\/div>\n                    <\/div>\n                    <div className=\"text-center\">\n                      <div className=\"text-xs text-slate-500\">LI<\/div>\n                      <div className=\"font-bold text-blue-500\">{formatNumber(m.linkedin)}<\/div>\n                    <\/div>\n                    <div className=\"text-center\">\n                      <div className=\"text-xs text-slate-500\">Posts<\/div>\n                      <div className=\"font-bold text-green-500\">{formatNumber(m.posts || 0)}<\/div>\n                    <\/div>\n                  <\/div>\n                  <div className=\"flex gap-2\">\n                    <button onClick={() => handleEdit(m)} className={`px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 ${isDark ? 'bg-slate-900 text-white hover:bg-cyan-600' : 'bg-slate-100 text-slate-700 hover:bg-blue-600 hover:text-white'}`}>✏️ Edit<\/button>\n                    <button onClick={() => handleDelete(m.month)} className={`px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 ${isDark ? 'bg-red-500/20 text-red-400 hover:bg-red-500/30' : 'bg-red-50 text-red-600 hover:bg-red-100'}`}>🗑️<\/button>\n                  <\/div>\n                <\/div>\n              ))}\n            <\/div>\n          )}\n        <\/div>\n      );\n    };\n\n    // --- SETTINGS MONTH SELECTOR (GRID VIEW) ---\n    const SettingsMonthSelector = ({ targets, setTargets, isDark, onSave }) => {\n      // 1. Generate the list of relevant months we want to support (Oct 2025 - Dec 2026+)\n      // This ensures we have fields for them even if they aren't in the DB yet.\n      const generatedMonths = [];\n      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n\n      for (let year = 2025; year <= 2026; year++) {\n        const startMonth = year === 2025 ? 9 : 0; // Start Oct 2025\n        const endMonth = 11;\n        for (let month = startMonth; month <= endMonth; month++) {\n          generatedMonths.push(`${monthNames[month]} ${year}`);\n        }\n      }\n\n      // 2. Merge with any existing keys in targets that might not be in our generated list\n      // STRICT FILTERING: Only allow keys that strictly match \"Month Year\" format (e.g. \"October 2025\")\n      // This prevents \"Wed Oct 01...\" garbage from showing up in the UI\n      const validKeyRegex = /^[A-Z][a-z]+ \\d{4}$/;\n      const extraKeys = Object.keys(targets).filter(k => validKeyRegex.test(k));\n\n      const allKeys = Array.from(new Set([...generatedMonths, ...extraKeys]));\n\n      // 3. Sort chronologically\n      const sortedMonths = allKeys.sort((a, b) => new Date(a) - new Date(b));\n\n      return (\n        <div className=\"space-y-6\">\n          <div className=\"grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar\">\n            {sortedMonths.map(month => {\n              const current = targets[month] || { reachPct: 15, engagementPct: 12 };\n              return (\n                <div key={month} className={`p-4 rounded-xl border transition hover:shadow-md ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}>\n                  <h4 className={`text-sm font-bold mb-3 ${isDark ? 'text-teal-400' : 'text-blue-600'}`}>{month}<\/h4>\n                  <div className=\"space-y-3\">\n                    <div>\n                      <label className={`block text-[10px] font-bold mb-1 uppercase tracking-wide ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Reach Growth (%)<\/label>\n                      <input\n                        type=\"number\"\n                        value={current.reachPct}\n                        onChange={e => setTargets({\n                          ...targets,\n                          [month]: { ...current, reachPct: parseFloat(e.target.value) || 0 }\n                        })}\n                        className={`w-full p-2.5 rounded-lg text-sm font-bold outline-none border focus:ring-2 focus:ring-teal-500/50 ${isDark ? 'bg-slate-800 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-800'}`}\n                      />\n                    <\/div>\n                    <div>\n                      <label className={`block text-[10px] font-bold mb-1 uppercase tracking-wide ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Engagement Rate (%)<\/label>\n                      <input\n                        type=\"number\"\n                        value={current.engagementPct}\n                        onChange={e => setTargets({\n                          ...targets,\n                          [month]: { ...current, engagementPct: parseFloat(e.target.value) || 0 }\n                        })}\n                        className={`w-full p-2.5 rounded-lg text-sm font-bold outline-none border focus:ring-2 focus:ring-purple-500/50 ${isDark ? 'bg-slate-800 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-800'}`}\n                      />\n                    <\/div>\n                  <\/div>\n                <\/div>\n              );\n            })}\n          <\/div>\n          <div className=\"flex justify-end pt-4 border-t border-slate-700/50\">\n            <button onClick={onSave} className=\"px-8 py-3 rounded-xl bg-teal-500 text-white font-bold hover:bg-teal-600 shadow-lg shadow-teal-500/20 transition transform active:scale-95 flex items-center gap-2\">\n              <span>💾<\/span> Save All Configuration\n            <\/button>\n          <\/div>\n        <\/div>\n      );\n    };\n\n    // --- BACKEND CMS (FORM INPUT) ---\n    const BackendCMS = ({ data, setData, isDark, onBack, targets, setTargets }) => {\n      const [activeTab, setActiveTab] = useState('data');\n      const [editingId, setEditingId] = useState(null);\n      const [formData, setFormData] = useState(null);\n      const [showAddWeekModal, setShowAddWeekModal] = useState(false);\n      const [newWeekForm, setNewWeekForm] = useState({ weekNumber: 1, month: 'January', year: 2026 });\n      // RACE CONDITION FIX: Track saving state to prevent concurrent saves\n      const [isSaving, setIsSaving] = useState(false);\n\n      const handleEdit = (weekId) => {\n        const weekData = data.find(d => d.id === weekId);\n        if (!weekData) {\n          alert(\"Week data not found\");\n          return;\n        }\n        setEditingId(weekId);\n        // Deep clone to ensure all nested objects are preserved\n        const safeData = JSON.parse(JSON.stringify(weekData));\n        // Ensure links are preserved (not defaulted to '#' or empty)\n        if (safeData.winningContent && !safeData.winningContent.link) {\n          safeData.winningContent.link = '';\n        }\n        if (safeData.losingContent && !safeData.losingContent.link) {\n          safeData.losingContent.link = '';\n        }\n        setFormData(safeData);\n      };\n\n      const handleDelete = (weekId) => {\n        const weekLabel = data.find(d => d.id === weekId)?.label || weekId;\n        if (!confirm(`Are you sure you want to delete ${weekLabel}?\\n\\nThis action cannot be undone.`)) return;\n\n        // CRITICAL: Work with current data state\n        const currentData = data && data.length > 0 ? [...data] : [];\n        const newData = currentData.filter(item => item.id !== weekId);\n\n        console.log(\"Deleting week. Before:\", currentData.length, \"After:\", newData.length);\n\n        if (typeof google !== 'undefined' && google.script) {\n          // Update local state immediately for better UX\n          setData(newData);\n\n          google.script.run\n            .withSuccessHandler((result) => {\n              console.log(\"Delete successful:\", result);\n              // Immediately reload to verify\n              google.script.run\n                .withSuccessHandler((serverData) => {\n                  console.log(\"Verification after delete - received\", serverData ? serverData.length : 0, \"weeks\");\n                  if (serverData && Array.isArray(serverData)) {\n                    setData(serverData);\n                    alert(\"✅ Week deleted successfully! (\" + serverData.length + \" weeks remaining)\");\n                  } else {\n                    alert(\"✅ Week deleted! (\" + newData.length + \" weeks remaining)\");\n                  }\n                })\n                .withFailureHandler((e) => {\n                  console.error(\"Verification failed:\", e);\n                  alert(\"✅ Week deleted! (Please use refresh button to verify)\");\n                })\n                .getWeeklyData();\n            })\n            .withFailureHandler((e) => {\n              console.error(\"Delete failed:\", e);\n              alert(\"❌ Failed to delete from database: \" + e);\n              // Revert to original data on error\n              setData(currentData);\n            })\n            .saveWeeklyData(newData);\n        } else {\n          setData(newData);\n          alert(\"Week deleted locally (Demo)\");\n        }\n      };\n\n      const handleAddNew = () => {\n        setShowAddWeekModal(true);\n        // Calculate next week based on last week in data\n        if (data.length > 0) {\n          const lastWeek = data[data.length - 1];\n          const lastDate = new Date(lastWeek.startDate);\n          const nextWeekStart = new Date(lastDate);\n          nextWeekStart.setDate(lastDate.getDate() + 7);\n          const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n          setNewWeekForm({\n            weekNumber: 1,\n            month: monthNames[nextWeekStart.getMonth()],\n            year: nextWeekStart.getFullYear()\n          });\n        }\n      };\n\n      const handleCreateWeek = () => {\n        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n        const monthIndex = monthNames.indexOf(newWeekForm.month);\n        if (monthIndex === -1) { alert(\"Invalid month\"); return; }\n\n        const year = newWeekForm.year;\n        const weekNum = newWeekForm.weekNumber;\n\n        // HELPER: Get Calendar Week Date Range\n        // Week 1: 1st of month -> First Saturday (or end of month if shorter)\n        // Week 2+: Sunday -> Saturday (or end of month)\n\n        let startDate, endDate;\n        const firstDayOfMonth = new Date(year, monthIndex, 1);\n        const lastDayOfMonth = new Date(year, monthIndex + 1, 0);\n\n        // Find end of first week (First Saturday)\n        let endOfWeek1 = new Date(firstDayOfMonth);\n        while (endOfWeek1.getDay() !== 6 && endOfWeek1 < lastDayOfMonth) {\n          endOfWeek1.setDate(endOfWeek1.getDate() + 1);\n        }\n\n        if (weekNum === 1) {\n          startDate = firstDayOfMonth;\n          endDate = endOfWeek1;\n        } else {\n          // Calculate start of requested week\n          // Start = End of Week 1 + 1 day + (weekNum - 2) * 7 days\n          let currentStart = new Date(endOfWeek1);\n          currentStart.setDate(currentStart.getDate() + 1); // Start of Week 2 (Sunday)\n\n          // Jump to the specific week\n          currentStart.setDate(currentStart.getDate() + (weekNum - 2) * 7);\n\n          if (currentStart > lastDayOfMonth) {\n            alert(`Week ${weekNum} is out of range for ${newWeekForm.month} ${year}.`);\n            return;\n          }\n\n          startDate = currentStart;\n\n          // End date is start + 6 days (Saturday) OR last day of month\n          let currentEnd = new Date(startDate);\n          currentEnd.setDate(currentEnd.getDate() + 6);\n\n          if (currentEnd > lastDayOfMonth) {\n            currentEnd = lastDayOfMonth;\n          }\n          endDate = currentEnd;\n        }\n\n        const monthAbbrevs = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];\n        const monthAbbrev = monthAbbrevs[monthIndex];\n\n        // Format: \"OCT 01 - OCT 04\" or \"OCT 05 - OCT 11\"\n        const dateRange = `${monthAbbrev} ${String(startDate.getDate()).padStart(2, '0')} - ${monthAbbrevs[endDate.getMonth()]} ${String(endDate.getDate()).padStart(2, '0')}`;\n\n        // Label: \"WEEK 1 OCT\"\n        const label = `WEEK ${weekNum} ${monthAbbrev}`;\n\n        const newId = `week-${weekNum}-${monthAbbrev.toLowerCase()}-${year}`;\n\n        const newWeek = {\n          id: newId,\n          startDate: startDate.toISOString().split('T')[0],\n          label: label,\n          dateRange: dateRange,\n          metrics: {\n            reach: 0,\n            engagement: 0,\n            views: 0,\n            profileActivity: 0,\n            followersPct: 0,\n            nonFollowersPct: 100,\n            storiesPct: 0,\n            reelsPct: 0,\n            feedsPct: 0\n          },\n          winningContent: {\n            type: 'IGR',\n            title: '',\n            thumbnail: '',\n            link: '', // Empty string, not '#'\n            analysis: { what: '', why: '', todo: '' }\n          },\n          losingContent: {\n            type: 'IGR',\n            title: '',\n            thumbnail: '',\n            link: '', // Empty string, not '#'\n            analysis: { what: '', why: '', todo: '' }\n          }\n        };\n\n        // Ensure metrics are initialized to 0 explicitly to avoid \"100%\" ghost issue\n        newWeek.metrics = {\n          reach: 0, engagement: 0, views: 0, profileActivity: 0,\n          followersPct: 0, nonFollowersPct: 0, // Explicitly 0\n          storiesPct: 0, reelsPct: 0, feedsPct: 0\n        };\n\n        setShowAddWeekModal(false);\n        setEditingId(newId);\n        setFormData(newWeek);\n      };\n\n      const handleSave = () => {\n        if (isSaving) {\n          alert(\"⚠️ Please wait - Save in progress...\");\n          return;\n        }\n\n        if (!formData || !formData.metrics) {\n          alert(\"Form data is missing. Please check all fields are filled correctly.\");\n          return;\n        }\n\n        if (formData.metrics.reach < 0) {\n          alert(\"Reach cannot be negative\");\n          return;\n        }\n\n        // Ensure all required fields are present and properly formatted\n        const sanitizedFormData = {\n          id: String(formData.id || editingId || `week-${Date.now()}`).trim(),\n          startDate: String(formData.startDate || '').trim(),\n          label: String(formData.label || '').trim(),\n          dateRange: String(formData.dateRange || '').trim(),\n          metrics: {\n            reach: Number(formData.metrics.reach) || 0,\n            engagement: Number(formData.metrics.engagement) || 0,\n            views: Number(formData.metrics.views) || 0,\n            profileActivity: Number(formData.metrics.profileActivity) || 0,\n            followersPct: Number(formData.metrics.followersPct) || 0,\n            nonFollowersPct: Number(formData.metrics.nonFollowersPct) || 0,\n            storiesPct: Number(formData.metrics.storiesPct) || 0,\n            reelsPct: Number(formData.metrics.reelsPct) || 0,\n            feedsPct: Number(formData.metrics.feedsPct) || 0\n          },\n          winningContent: {\n            type: String(formData.winningContent?.type || 'IGR').trim(),\n            title: String(formData.winningContent?.title || '').trim(),\n            thumbnail: '',\n            link: formData.winningContent?.link !== undefined && formData.winningContent?.link !== null && formData.winningContent?.link !== '#'\n              ? String(formData.winningContent.link).trim()\n              : '',\n            analysis: {\n              what: String(formData.winningContent?.analysis?.what || '').trim(),\n              why: String(formData.winningContent?.analysis?.why || '').trim(),\n              todo: String(formData.winningContent?.analysis?.todo || '').trim()\n            }\n          },\n          losingContent: {\n            type: String(formData.losingContent?.type || 'IGR').trim(),\n            title: String(formData.losingContent?.title || '').trim(),\n            thumbnail: '',\n            link: formData.losingContent?.link !== undefined && formData.losingContent?.link !== null && formData.losingContent?.link !== '#'\n              ? String(formData.losingContent.link).trim()\n              : '',\n            analysis: {\n              what: String(formData.losingContent?.analysis?.what || '').trim(),\n              why: String(formData.losingContent?.analysis?.why || '').trim(),\n              todo: String(formData.losingContent?.analysis?.todo || '').trim()\n            }\n          }\n        };\n\n        // CRITICAL: Deep clone current data state to preserve ALL existing weeks\n        let currentData;\n        try {\n          currentData = Array.isArray(data) && data.length > 0\n            ? JSON.parse(JSON.stringify(data))\n            : [];\n          console.log(\"📊 Current data state:\", currentData.length, \"weeks before save\");\n        } catch (e) {\n          console.error(\"Error cloning data:\", e);\n          currentData = Array.isArray(data) ? [...data] : [];\n        }\n\n        // Find if this week already exists\n        const existingIndex = currentData.findIndex(d => d.id === sanitizedFormData.id);\n\n        let newData;\n        if (existingIndex >= 0) {\n          // Update existing week - preserve ALL other weeks\n          newData = [...currentData];\n          newData[existingIndex] = sanitizedFormData;\n          console.log(\"🔄 Updating week:\", sanitizedFormData.label, \"- Total:\", newData.length, \"weeks\");\n        } else {\n          // Add new week - preserve ALL existing weeks\n          newData = [...currentData, sanitizedFormData];\n          console.log(\"➕ Adding new week:\", sanitizedFormData.label, \"- Total:\", newData.length, \"weeks\");\n        }\n\n        // CRITICAL VALIDATION\n        if (newData.length === 0) {\n          alert(\"❌ Error: No data to save.\\n\\nPlease use Refresh button to reload data from database.\");\n          return;\n        }\n\n        // Lock UI to prevent concurrent saves\n        setIsSaving(true);\n        // Update local state immediately for better UX\n        setData(newData);\n\n        if (typeof google !== 'undefined' && google.script) {\n          // Save ALL weeks to database\n          google.script.run\n            .withSuccessHandler((result) => {\n              console.log(\"✅ Save successful:\", result);\n              setEditingId(null);\n              // Immediate verification\n              google.script.run\n                .withSuccessHandler((serverData) => {\n                  setIsSaving(false); // Unlock UI\n                  if (serverData && Array.isArray(serverData) && serverData.length > 0) {\n                    setData(serverData);\n                    alert(\"✅ Saved successfully!\\n\\n\" + serverData.length + \" weeks in database\");\n                  } else {\n                    alert(\"✅ Saved!\\n\\n\" + newData.length + \" weeks saved\\n\\n(Use Refresh to verify)\");\n                  }\n                })\n                .withFailureHandler((e) => {\n                  setIsSaving(false); // Unlock UI\n                  console.error(\"Verification failed:\", e);\n                  alert(\"✅ Saved!\\n\\n\" + newData.length + \" weeks saved\\n\\n(Use Refresh to verify)\");\n                })\n                .getWeeklyData();\n            })\n            .withFailureHandler((e) => {\n              console.error(\"❌ Save failed:\", e);\n              setIsSaving(false); // Unlock UI on error\n              // Revert on error\n              setData(currentData);\n              alert(\"❌ Save failed:\\n\\n\" + e + \"\\n\\nData reverted. Please try again or use Refresh.\");\n            })\n            .saveWeeklyData(newData);\n        } else {\n          setIsSaving(false); // Unlock UI in demo mode\n          setData(newData);\n          alert(\"Data saved locally (Demo mode)\");\n          setEditingId(null);\n        }\n      };\n\n      const handleSaveSettings = () => {\n        if (typeof google !== 'undefined' && google.script) {\n          google.script.run\n            .withSuccessHandler(() => alert(\"Targets Saved\"))\n            .saveTargets(targets);\n        } else {\n          alert(\"Targets saved locally (Demo)\");\n        }\n      };\n\n      const calculateTotal = (metrics) => {\n        const reach = metrics.reach || 0;\n        return reach + calculateAbsolute(reach, metrics.followersPct || 0) + calculateAbsolute(reach, metrics.nonFollowersPct || 0) + metrics.profileActivity + calculateAbsolute(reach, metrics.storiesPct || 0) + calculateAbsolute(reach, metrics.reelsPct || 0) + calculateAbsolute(reach, metrics.feedsPct || 0);\n      };\n\n      const currentTotal = formData ? calculateTotal(formData.metrics) : 0;\n      const currentER = formData ? ((formData.metrics.engagement / formData.metrics.reach) * 100).toFixed(2) : 0;\n\n      return (\n        <div className=\"space-y-6 pb-12\">\n          {showAddWeekModal && (\n            <div className=\"fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4\">\n              <div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl border ${isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>\n                <h3 className={`text-xl font-bold mb-6 ${isDark ? 'text-white' : 'text-slate-900'}`}>➕ Add New Week<\/h3>\n                <div className=\"space-y-4\">\n                  <div>\n                    <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>Week Number<\/label>\n                    <input type=\"number\" min=\"1\" max=\"5\" value={newWeekForm.weekNumber} onChange={e => setNewWeekForm({ ...newWeekForm, weekNumber: parseInt(e.target.value) || 1 })} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`} />\n                  <\/div>\n                  <div>\n                    <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>Month<\/label>\n                    <select value={newWeekForm.month} onChange={e => setNewWeekForm({ ...newWeekForm, month: e.target.value })} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`}>\n                      {['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'].map(m => <option key={m} value={m}>{m}<\/option>)}\n                    <\/select>\n                  <\/div>\n                  <div>\n                    <label className={`block text-xs font-bold mb-2 ${isDark ? 'text-slate-400' : 'text-slate-600'}`}>Year<\/label>\n                    <input type=\"number\" min=\"2025\" max=\"2027\" value={newWeekForm.year} onChange={e => setNewWeekForm({ ...newWeekForm, year: parseInt(e.target.value) || 2026 })} className={`w-full p-3 rounded-xl text-sm border outline-none ${isDark ? 'bg-slate-900 border-slate-600 text-white' : 'bg-white border-slate-300 text-slate-900'}`} />\n                  <\/div>\n                  <div className={`p-4 rounded-xl border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-20
